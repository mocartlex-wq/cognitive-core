# nginx-include.conf — server-блок для AI-CRM в составе cognitive-core nginx.
#
# Установка:
#   1. Скопировать на сервер:
#      sudo cp /opt/ai-crm/deploy/salex/nginx-include.conf \
#              /opt/cognitive-core/nginx/conf.d/ai-crm.conf
#
#   2. Получить TLS-сертификат для домена (Let's Encrypt через cognitive-core):
#      sudo bash /opt/cognitive-core/scripts/setup-tls.sh letsencrypt \
#              ai-salex.ru mocartlex@yandex.ru
#
#   3. Reload nginx внутри cognitive_nginx:
#      sudo docker exec cognitive_nginx nginx -t  # проверка конфига
#      sudo docker exec cognitive_nginx nginx -s reload
#
# ВАЖНО:
#   - Этот файл должен подключаться через `include /etc/nginx/conf.d/*.conf;`
#     в основном nginx.conf cognitive-core. Если сейчас включения нет —
#     добавить вручную в http {} блок основного конфига.
#   - upstream ai-crm-* указывает на host.docker.internal — это работает
#     только если cognitive_nginx запущен с --add-host. Если нет —
#     использовать IP host'а в docker bridge (обычно host.docker.internal)
#     или подключить ai-crm к cognitive-core_default network через external.

# ─── Upstream'ы (host:port биндинги ai-crm-стека) ────────────────────────

upstream ai-crm-backend {
    # ai-crm-backend контейнер биндит 127.0.0.1:8780 на host (см. docker-compose.salex.yml)
    server ai-crm-backend:8787;
    keepalive 16;
}

upstream ai-crm-frontend {
    # ai-crm-frontend контейнер биндит 127.0.0.1:3030 на host
    server ai-crm-frontend:3000;
    keepalive 16;
}

# 2026-05-07: Облако (MinIO) для AI-CRM. Запущен в docker-compose ai-crm-minio.
# expose 9000 (S3 API) + 9001 (Console) внутри docker-сети ai-crm_default.
# Чтобы доставать с cognitive-core nginx — нужно сделать external network
# или биндить на host. Здесь предполагаем что docker compose биндит:
#   - 127.0.0.1:9080 → minio:9000 (S3)
#   - 127.0.0.1:9081 → minio:9001 (Console)
upstream ai-crm-minio-s3 {
    server host.docker.internal:9080;
    keepalive 16;
}
upstream ai-crm-minio-console {
    server host.docker.internal:9081;
    keepalive 16;
}

# 2026-05-07: STAGING upstream'ы (порты +100 от prod, см. stage.sh).
# Поднимаются только когда запущен staging-стек, иначе nginx просто отдаст 502.
upstream ai-crm-staging-backend {
    server host.docker.internal:8880;
    keepalive 16;
}
upstream ai-crm-staging-frontend {
    server host.docker.internal:3130;
    keepalive 16;
}

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name ai-salex.ru www.ai-salex.ru cloud.ai-salex.ru staging.ai-salex.ru;

    # Let's Encrypt webroot — оставляем для cert-renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS terminator + reverse proxy ────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai-salex.ru www.ai-salex.ru;

    # Cert от Let's Encrypt (общий с cognitive-core volume letsencrypt:/etc/letsencrypt)
    ssl_certificate /etc/letsencrypt/live/ai-salex.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-salex.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # HSTS на 6 месяцев (после полной проверки можно увеличить)
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Большие upload'ы (документы до 50 МБ + запас)
    client_max_body_size 64M;
    client_body_timeout 60s;
    proxy_read_timeout 120s;

    # ─── /api/* → backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://ai-crm-backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;  # SSE / streaming должны идти live
    }

    # ─── /api/ws/* — WebSocket ───────────────────────────────────────────
    location /api/ws/ {
        proxy_pass http://ai-crm-backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;       # WS-соединения долгоживущие
        proxy_send_timeout 3600s;
    }

    # ─── /embed.js — публичный JS для embed-формы (CORS) ────────────────
    location = /embed.js {
        proxy_pass http://ai-crm-frontend;
        proxy_set_header Host $host;
        # CORS чтобы можно было встроить в любой сайт
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=300" always;  # кэш 5 минут
    }

    # ─── Всё остальное → frontend (Next.js) ──────────────────────────────
    location / {
        proxy_pass http://ai-crm-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;       # для Next.js HMR
        proxy_set_header Connection "upgrade";
    }

    # ─── Healthcheck (без proxy, чтобы видеть статус самого nginx) ──────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ──────────────────────────────────────────────────────────────────────────
# cloud.ai-salex.ru — MinIO облако для AI-CRM (документы / КП / аватары /
# голосовые заметки / прикрепления писем). Отдельный поддомен — отдельный
# TLS-cert и отдельная пропускная способность от основного приложения.
#
# Поддомен:
#   /          → MinIO S3 API (для CRM + клиентов через signed-URL)
#   /console   → MinIO Web UI (админка файлов под basic auth)
# ──────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cloud.ai-salex.ru;

    ssl_certificate /etc/letsencrypt/live/ai-salex.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-salex.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # MinIO держит большие файлы — увеличиваем лимиты
    client_max_body_size 5G;
    proxy_request_buffering off;     # стримить большие upload без буферизации
    proxy_buffering off;             # стримить downloads
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # ─── /console → MinIO Web UI (для админки файлов) ────────────────────
    # WebSocket для live-логов в консоли требует Upgrade header.
    location /console/ {
        rewrite ^/console/(.*) /$1 break;
        proxy_pass http://ai-crm-minio-console;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── / → MinIO S3 API (для AI-CRM + signed-URL клиентам) ────────────
    location / {
        proxy_pass http://ai-crm-minio-s3;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# ──────────────────────────────────────────────────────────────────────────
# staging.ai-salex.ru — STAGING-копия CRM для тестов перед промоутом в prod.
# Защищён basic-auth чтобы клиенты случайно не попали на сырую версию.
# Когда staging не запущен (нет stage.sh) — отдаст 502 (это нормально).
# ──────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.ai-salex.ru;

    ssl_certificate /etc/letsencrypt/live/ai-salex.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-salex.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Basic-auth — защита от случайных гостей.
    # Создать файл паролей:
    #   sudo apt install apache2-utils
    #   sudo htpasswd -c /opt/cognitive-core/nginx/conf.d/staging.htpasswd staging
    #   (введи пароль)
    # ВНИМАНИЕ: путь к htpasswd должен быть смонтирован в cognitive_nginx
    # контейнер. Проверить через `docker inspect cognitive_nginx`.
    auth_basic "Staging — введи пароль";
    auth_basic_user_file /etc/nginx/conf.d/staging.htpasswd;

    # Header чтобы видно было что это staging
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Environment "staging" always;

    client_max_body_size 64M;

    location /api/ {
        proxy_pass http://ai-crm-staging-backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;  # SSE
    }

    location /api/ws/ {
        proxy_pass http://ai-crm-staging-backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://ai-crm-staging-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
