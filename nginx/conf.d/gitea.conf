# ════════════════════════════════════════════════════════════════════════
# Gitea — git.ии-память.рф (Phase 5A)
# ════════════════════════════════════════════════════════════════════════
# Self-hosted git server. Поднимается на cognitive_gitea:3000 (docker network).
# SSH-доступ к repos через :22002 на хосте → :2222 в контейнере.
#
# Cert: Let's Encrypt combined SAN для git.xn----8sbwawqx4fza.xn--p1ai + git.me-ai.ru
#       Cert файлы копируются в /opt/cognitive-core/nginx/certs/gitea.{crt,key}
#       автоматически renewal hook'ом (deploy/cogcore-nginx-reload.sh).
# DNS:  A-record git.me-ai.ru + git.ии-память.рф → IP сервера (Reg.ru DNS)
#
# Pattern copied from nginx/conf.d/ai-crm.conf (cloud.ai-salex.ru block).

# ─── HTTP → HTTPS redirect ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name git.me-ai.ru git.xn----8sbwawqx4fza.xn--p1ai git.ии-память.рф;

    # Let's Encrypt webroot — для cert renewal через certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS terminator + reverse proxy ───────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    # Primary ASCII — git.me-ai.ru. Punycode + IDN — legacy aliases.
    server_name git.me-ai.ru git.xn----8sbwawqx4fza.xn--p1ai git.ии-память.рф;

    # Cert через nginx mount (renewal hook копирует из /etc/letsencrypt/live/...).
    # SAN: git.xn----8sbwawqx4fza.xn--p1ai, git.me-ai.ru
    ssl_certificate /etc/nginx/certs/gitea.crt;
    ssl_certificate_key /etc/nginx/certs/gitea.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Большие upload'ы для git LFS + push больших монорепо до 500 МБ
    client_max_body_size 512M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ─── Все запросы → Gitea (port 3000 в docker network) ──────────────
    location / {
        proxy_pass http://cognitive_gitea:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Gitea LFS / git clone больших repos требует длинных stream'ов
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
