# ─────────────────────────────────────────────────────────────────────────
# Локации для auth + user (Фаза 2, 2026-05-17)
#
# Вставить ВНУТРЬ существующего `server { listen 443 ssl; ... }` блока,
# рядом с другими /api/ и /mcp/ locations.
#
# Назначение:
#   /auth/email/request    — POST: запросить magic-link письмо
#   /auth/email/verify     — GET (клик из письма): set-cookie + redirect
#   /auth/logout, /auth/sessions, ... — управление сессиями
#   /user/me, /user/rooms, /user/agents, ... — текущий аккаунт
#   /ui/login, /ui/profile — HTML страницы
#
# Все идут на cognitive_api:8000 (через docker network).
# proxy_pass_request_headers on — нужно чтобы cookie/Authorization дошли.
# ─────────────────────────────────────────────────────────────────────────

location /auth/ {
    proxy_pass         http://cognitive_api:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # CORS preflight для cookie-flow
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "$http_origin";
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, X-Session-Id, X-API-Key";
        add_header Access-Control-Max-Age "3600";
        return 204;
    }
}

location /user/ {
    proxy_pass         http://cognitive_api:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_read_timeout 30s;
}

location = /ui/login {
    proxy_pass         http://cognitive_api:8000/ui/login;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-Proto https;
}

location = /ui/profile {
    proxy_pass         http://cognitive_api:8000/ui/profile;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-Proto https;
}
