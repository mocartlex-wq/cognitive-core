# Cognitive Core — production nginx config
# TLS termination + rate limiting + reverse proxy → FastAPI

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # External server-blocks (per-domain, e.g. ai-crm). conf.d mounted via docker-compose.override.yml.
    # Each *.conf in /etc/nginx/conf.d/ adds its own server { } blocks alongside the cognitive-core ones below.
    include /etc/nginx/conf.d/*.conf;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Логи
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Rate limiting (дополнительно к Redis-уровню в API)
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=demo_rl:10m rate=2r/m;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json text/html;
    gzip_min_length 1024;

    # Upstream к FastAPI
    upstream cognitive_api {
        server api:8000;
        keepalive 32;
    }

    # HTTP → HTTPS redirect (catch-all для всех хостов)
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS default — отбиваем нерелевантные хосты (защита от bot-сканов и неправильного SNI)
    server {
        listen 443 ssl http2 default_server;
        server_name _;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_reject_handshake on;
        return 444;
    }

    # HTTPS — основной сервер
    server {
        listen 443 ssl http2;
        # Punycode-форма обязательна, IDN-форма как алиас.
        # При смене домена — обновить также setup-tls.sh letsencrypt <punycode> и certbot.
        server_name mcp.xn----8sbwawqx4fza.xn--p1ai mcp.ии-память.рф;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 1m;  # ≥ MAX_PAYLOAD_SIZE

        # Защитить /metrics от публичного доступа
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://cognitive_api;
            proxy_set_header Host $host;
        }

        # Демо-эндпоинт со строгим rate-limit
        location /demo/ {
            limit_req zone=demo_rl burst=2;
            proxy_pass http://cognitive_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;        # для streaming response
            proxy_read_timeout 300s;    # daily/weekly могут идти долго
        }

        # MCP SSE transport — для remote MCP-клиентов (Claude Desktop / Cursor / Cherry Studio / claude.ai).
        # Проксирует на отдельный контейнер cognitive_mcp (alias `mcp` в compose-сети).
        #
        # FastMCP 2.x sse_app() в init-кадре отдаёт относительный path `data: /messages/?session_id=...`,
        # клиент склеивает с корнем домена и POSTит на /messages/ — без переписывания это уйдёт
        # в `location /` (cognitive_api) и вернёт 404. Поэтому:
        #   1. На /mcp/sse делаем sub_filter и переписываем path в SSE-фрейме.
        #   2. /mcp/messages/ отдельным роутом проксируем на mcp:8765/messages/.
        location = /mcp/sse {
            # NATIVE MCP endpoint in cognitive_api (replaces broken cognitive_mcp container)
            proxy_pass http://cognitive_api/mcp/sse;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 60s;
        }

        location /mcp/messages {
            # NATIVE MCP JSON-RPC dispatch (in cognitive_api)
            proxy_pass http://cognitive_api/mcp/messages;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 65s;
        }

        location /mcp/ {
            # NATIVE MCP everything (in cognitive_api). Includes /mcp/health, /mcp/sse, /mcp/messages
            proxy_pass http://cognitive_api/mcp/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 65s;
        }

        # NATS WebSocket gateway — wake-on-message Variant 2
        # WSS endpoint для cogcore-wake-daemon-nats.py клиентов на ноутах.
        # Backend: cognitive_nats websocket port 8443 (NATS server config /etc/nats/nats.conf).
        # Долгоживущие WS соединения: read/send_timeout 24h.
        location /nats-ws {
            proxy_pass http://nats:8443;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering off;
        }

        # Cognitive Core Rooms REST API (proxied to host port 9098)
        location /rooms {
            proxy_pass http://host.docker.internal:9098/rooms;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            # Long-poll ask endpoint may hang up to 60s — give nginx buffer
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
        }

        # ─── Phase 2 (2026-05-19): account/auth страницы из cognitive_api ───
        # Точные совпадения — они выигрывают по приоритету у `location /ui/`
        location = /ui/login {
            proxy_pass http://cognitive_api/ui/login;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location = /ui/profile {
            proxy_pass http://cognitive_api/ui/profile;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Админ-страницы (cognitive_api) — /ui/admin/errors и т.п.
        location /ui/admin/ {
            proxy_pass http://cognitive_api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # /api/* — для будущих API-эндпоинтов из cognitive_api (errors, и т.п.)
        location /api/ {
            proxy_pass http://cognitive_api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # /auth/* — endpoints магик-ссылки + сессии (cognitive_api)
        location /auth/ {
            proxy_pass http://cognitive_api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_read_timeout 30s;
        }

        # /user/* — endpoints профиля и привязанных ресурсов (cognitive_api)
        location /user/ {
            proxy_pass http://cognitive_api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Cognitive Core Rooms UI + Team chat (proxied to host port 9098)
        location /ui/ {
            proxy_pass http://host.docker.internal:9098/ui/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 60s;
        }

        location = /ui {
            return 301 $scheme://$host/ui/;
        }

                # Основной API
        location / {
            limit_req zone=api_rl burst=50 nodelay;
            proxy_pass http://cognitive_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
        }
    }
}


