# Production overlay для Cognitive Core.
# Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Что добавляет:
#   - Resource limits (CPU/memory) — защита от OOM на сервере
#   - Logging rotation (max-size + max-file)
#   - Скрытые внутренние порты (доступ только через nginx)
#   - nginx с TLS termination
#   - Backup-сервис с cron
#   - Production passwords из env (POSTGRES_PASSWORD, S3_*)

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: '1.0', memory: 2G }
        reservations: { cpus: '0.5', memory: 1G }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    restart: always

  redis:
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 1G }
        reservations: { cpus: '0.25', memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    restart: always

  minio:
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change_me_in_prod}
    # В prod не выставляем порты наружу — backup и api ходят через docker network.
    # Если нужен MinIO console на сервере — раскомментируйте:
    # ports:
    #   - "127.0.0.1:9000:9000"
    #   - "127.0.0.1:9002:9001"
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 1G }
        reservations: { cpus: '0.25', memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    restart: always

  api:
    ports: !reset []
    expose:
      - "8000"
    volumes:
      # Whisper модель (~150MB для base) — persist между rebuild'ами,
      # иначе при каждой пересборке скачивается с HuggingFace.
      - whisper_cache:/data/whisper
    # Vision API ключ (Qwen-VL для media mechanics) — owner-managed env file.
    # required=false: если файл не существует — api всё равно стартует, vision
    # stage просто пропускается (graceful degradation).
    env_file:
      - path: /etc/cogcore-qwen.env
        required: false
    environment:
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-base}
      WHISPER_CACHE_DIR: /data/whisper
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://mcp.me-ai.ru}
    deploy:
      resources:
        # Bumped: ffmpeg + Whisper транскрипция жрут CPU/RAM при анализе видео
        limits: { cpus: '2.0', memory: 3G }
        reservations: { cpus: '0.5', memory: 1G }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: cognitive_nginx
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "https://localhost/health", "--no-check-certificate"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Backup service — runs cron in container, scheduled pg_dump + MinIO mirror
  backup:
    image: alpine:3.20
    container_name: cognitive_backup
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    environment:
      DB_USER: cognitive
      DB_NAME: cognitive_core
      DB_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      RETENTION_DAYS: 14
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change_me_in_prod}
      S3_ENDPOINT: http://minio:9000
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache postgresql-client mc dcron tzdata && \
        cp /scripts/cron-backup.sh /usr/local/bin/cron-backup.sh && \
        chmod +x /usr/local/bin/cron-backup.sh && \
        echo '0 */6 * * * /usr/local/bin/cron-backup.sh >> /backups/backup.log 2>&1' | crontab - && \
        crond -f -l 8
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }
    restart: always

  # ════════════════════════════════════════════════════════════════
  # NATS JetStream — message broker для replication server → local
  # ════════════════════════════════════════════════════════════════
  # DS-architecture (chosen pattern: Hybrid Outbox + NATS JS).
  # Server = primary, local = mirror. Outbox publisher на server читает
  # таблицу replication_outbox и публикует events в NATS streams.
  # Local NATS-consumer читает события и применяет в local Postgres
  # идемпотентно (UNIQUE event_id, ON CONFLICT DO NOTHING).
  #
  # Stream layout:
  #   cognitive.repl.l1       — L1 raw_events
  #   cognitive.repl.l3       — L3 knowledge + tools
  #   cognitive.repl.l4       — L4 snapshots
  #   cognitive.repl.agent    — agent_states checkpoints
  #
  # Порты:
  #   4222 — клиентское подключение (внутри docker network)
  #   8222 — мониторинг (HTTP, /varz, /jsz)
  #   6222 — NATS cluster route (для будущего multi-node)
  #
  # Наружу (через nginx) НЕ выставляем — local consumer ходит через WG-туннель
  # на 10.66.66.1:4222 (binding на server WG-IP, см. ниже)
  nats:
    image: nats:2.10-alpine
    container_name: cognitive_nats
    command:
      - "-n"
      - "cognitive-nats"
      - "-m"
      - "8222"
      - "-js"
      - "-sd"
      - "/data/jetstream"
    ports:
      # Client — слушаем на всех интерфейсах (UFW ограничит снаружи)
      - "4222:4222"
      # Monitor — только loopback, чтобы не торчало наружу
      - "127.0.0.1:8222:8222"
    volumes:
      - nats_data:/data
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 512M }
        reservations: { cpus: '0.1', memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════════════════
  # Gitea — self-hosted git server (Phase 5A)
  # ════════════════════════════════════════════════════════════════
  # Self-hosted git for owner + paying tenants. Каждый tenant получает
  # свой org (auto-create при email-verify через welcome-flow).
  # Хранение кода + configs + LFS на сервере, не на ноутах клиентов.
  #
  # DB: используем существующий cognitive_postgres (отдельная database
  # gitea_db, создаётся в lifespan через init-script). SQLite не выбран —
  # пропадает общий backup и tooling.
  #
  # Storage: named docker volume gitea_data (MVP). После первого месяца
  # production — мигрировать на bind /mnt/cold-storage/gitea/ если репо
  # начнут расти выше 50 GB.
  #
  # Порт 3000 не торчит наружу — только через nginx git.me-ai.ru
  # (legacy alias: git.ии-память.рф).
  # SSH-доступ к repos (git@git.me-ai.ru:22002) — экспозим 22002 на
  # хосте (22 занят системным sshd, не конфликт).
  gitea:
    image: gitea/gitea:latest-rootless
    container_name: cognitive_gitea
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea_db
      GITEA__database__USER: cognitive
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD:-change_me}
      GITEA__server__DOMAIN: git.me-ai.ru
      GITEA__server__SSH_DOMAIN: git.me-ai.ru
      GITEA__server__ROOT_URL: https://git.me-ai.ru/
      GITEA__server__SSH_PORT: "22002"
      GITEA__server__SSH_LISTEN_PORT: "2222"  # internal в контейнере
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"  # только admin создаёт users
      GITEA__service__REQUIRE_SIGNIN_VIEW: "true"  # repos private по умолчанию
      GITEA__repository__DEFAULT_PRIVATE: "private"
      GITEA__security__INSTALL_LOCK: "true"  # не показывать setup-wizard
      GITEA__security__SECRET_KEY: ${GITEA_SECRET_KEY:-change_me_to_random_64_chars}
      GITEA__security__INTERNAL_TOKEN: ${GITEA_INTERNAL_TOKEN:-change_me_to_random_token}
      GITEA__webhook__ALLOWED_HOST_LIST: "*.me-ai.ru,*.xn----8sbwawqx4fza.xn--p1ai,private"
    expose:
      - "3000"
    ports:
      - "22002:2222"  # SSH для git clone/push через ssh
    volumes:
      - gitea_data:/var/lib/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 1G }
        reservations: { cpus: '0.1', memory: 256M }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  nginx_logs:
  nats_data:
    name: cognitive_nats_data
  whisper_cache:
    name: cognitive_whisper_cache
  gitea_data:
    name: cognitive_gitea_data
