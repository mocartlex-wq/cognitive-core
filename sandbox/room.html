<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Комната — Cognitive Core</title>
<meta name="color-scheme" content="dark">
<meta name="darkreader-lock">
<meta name="theme-color" content="#0a0e14">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2358a6ff'/%3E%3Ctext x='50%25' y='58%25' font-size='34' font-weight='700' fill='white' text-anchor='middle' font-family='system-ui'%3EC%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/shared.css?v=20260520j">
<link rel="stylesheet" href="/static/glass.css?v=20260613">
<style>
  html, body { background: var(--glass-base-bg) !important; color: var(--glass-text) !important; }
  body { min-height: 100vh; }

  .page { max-width: 920px; margin: 32px auto 80px; padding: 0 20px; position: relative; z-index: 1; }
  .page-title {
    font-size: 13px; font-weight: 600; letter-spacing: 1.6px;
    color: var(--glass-text-dim); text-transform: uppercase;
    margin: 0 0 22px; padding: 0 6px;
    display: flex; align-items: center; gap: 12px; justify-content: space-between;
  }
  .back-link { font-size: 13px; font-weight: 500; letter-spacing: 0; text-transform: none;
    color: var(--glass-orb-1); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }

  .card {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--apple-radius);
    box-shadow: var(--glass-shadow);
    padding: 24px 28px; margin-bottom: 18px;
  }
  .card h2 {
    margin: 0 0 16px; font-size: 16px; font-weight: 600;
    color: var(--glass-text);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }

  .empty { color: var(--glass-text-dim); font-size: 14px; padding: 18px 0; text-align: center; }
  .empty a { color: var(--glass-orb-1); text-decoration: none; }
  .empty a:hover { text-decoration: underline; }

  .btn {
    font-size: 13.5px; font-weight: 600; padding: 8px 14px;
    border-radius: 9px; border: 0; cursor: pointer;
    background: var(--glass-orb-1); color: #0a0e14;
    text-decoration: none; display: inline-block;
    transition: filter 0.15s; font-family: var(--font);
  }
  .btn:hover:not(:disabled) { filter: brightness(1.1); }
  .btn.secondary {
    background: var(--glass-bg-light); color: var(--glass-text);
    border: 1px solid var(--glass-border);
  }
  .btn.secondary:hover:not(:disabled) { background: rgba(255,255,255,0.06); }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }
  .btn:disabled { opacity: 0.55; cursor: progress; }

  .grid { display: grid; gap: 10px; }
  .item {
    display: grid; grid-template-columns: 1fr auto; gap: 14px;
    padding: 14px 16px; background: var(--glass-bg-light);
    border: 1px solid var(--glass-border); border-radius: 14px;
    align-items: center;
  }
  .item .name { font-weight: 600; font-size: 14.5px; color: var(--glass-text); }
  .item .meta { font-size: 12.5px; color: var(--glass-text-dim); margin-top: 3px; }

  .chip {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; margin-left: 6px;
    background: rgba(88,166,255,0.15); color: var(--glass-orb-1);
    border: 1px solid rgba(88,166,255,0.25);
  }

  /* === Ключ для приглашения — выделенный orange блок (как api-key-display в profile) === */
  .key-box {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: rgba(255,140,66,0.08);
    border: 1px solid rgba(255,140,66,0.25);
    border-radius: 10px; padding: 13px 16px; margin: 4px 0 10px;
  }
  .key-box code {
    flex: 1; min-width: 200px;
    font-family: var(--mono); font-size: 12.5px;
    word-break: break-all; line-height: 1.5; color: var(--glass-text);
  }
  .key-hint { font-size: 12.5px; color: var(--glass-text-dim); line-height: 1.5; margin: 0; }

  /* === Тред сообщений === */
  .thread { display: flex; flex-direction: column; gap: 10px; max-height: 460px; overflow-y: auto; padding-right: 4px; }
  .msg {
    padding: 11px 14px; background: var(--glass-bg-light);
    border: 1px solid var(--glass-border); border-radius: 14px;
  }
  .msg.is-owner { background: rgba(88,166,255,0.08); border-color: rgba(88,166,255,0.22); }
  .msg-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .msg-from { font-weight: 600; font-size: 13px; color: var(--glass-orb-1); word-break: break-word; }
  .msg.is-owner .msg-from { color: #4cc960; }
  .msg-time { font-size: 11.5px; color: var(--glass-text-dim); white-space: nowrap; flex-shrink: 0; }
  .msg-text { font-size: 14px; color: var(--glass-text); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

  /* === Поле ввода === */
  .composer { display: flex; gap: 10px; align-items: flex-end; margin-top: 16px; }
  .composer textarea {
    flex: 1; min-height: 44px; max-height: 160px; resize: vertical;
    padding: 11px 13px; font-size: 14px; font-family: var(--font);
    border-radius: 9px; border: 1px solid var(--glass-border);
    background: var(--glass-bg-light); color: var(--glass-text);
    box-sizing: border-box; line-height: 1.4;
    /* Smooth auto-grow: высота меняется плавно при добавлении/удалении строки,
       а не скачком. cubic-bezier подобран чтобы рост ощущался мгновенным в
       начале и мягко доезжал к финалу (~120 мс — короче чем «заметная» анимация,
       но достаточно чтобы устранить «ступеньку»). */
    transition: height 0.12s cubic-bezier(0.4, 0, 0.2, 1);
  }
  /* На случай очень быстрого набора (>10 знаков/сек) или вставки большого
     блока — не показывать промежуточный «прыжок» через 'auto'. */
  .composer textarea.no-transition { transition: none !important; }
  .composer textarea:focus {
    outline: none; border-color: var(--glass-orb-1);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.10);
  }

  /* «Агент печатает…» — эфемерный индикатор между тредом и композером.
     Данные приходят в detail.typing (Redis TTL), исчезает сам. */
  .typing-bar {
    display: flex; align-items: center; gap: 8px;
    margin: 8px 2px 0; font-size: 13px; color: var(--glass-text-dim);
    animation: typing-fade .25s ease-in;
  }
  @keyframes typing-fade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
  .typing-dots { display: inline-flex; gap: 3px; }
  .typing-dots i {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--glass-text-dim); display: inline-block;
    animation: typing-bounce 1.2s infinite ease-in-out;
  }
  .typing-dots i:nth-child(2) { animation-delay: .15s; }
  .typing-dots i:nth-child(3) { animation-delay: .3s; }
  @keyframes typing-bounce { 0%,60%,100% { opacity: .35; transform: none; } 30% { opacity: 1; transform: translateY(-3px); } }

  /* Тонкая подсказка под композером — про поведение Enter под устройство. */
  .composer-hint {
    font-size: 11.5px; color: var(--glass-text-dim); margin-top: 6px;
    line-height: 1.35; opacity: 0.7;
  }

  /* Ряд action-кнопок (mic / file) между textarea и «Отправить» */
  .composer-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .composer-actions .act {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; padding: 8px 12px; min-height: 38px;
    border-radius: 9px; cursor: pointer; font-size: 13px;
    background: var(--glass-bg-light); color: var(--glass-text);
    border: 1px solid var(--glass-border); font-family: var(--font);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .composer-actions .act:hover { background: rgba(255,255,255,0.06); }
  .composer-actions .act:active { filter: brightness(0.9); }
  .composer-actions .act.recording {
    background: rgba(255,69,58,0.16); color: #ff6b65;
    border-color: rgba(255,69,58,0.4);
    animation: rec-pulse 1.2s ease-in-out infinite;
  }
  @keyframes rec-pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
  .composer-actions .act .ico { font-size: 16px; line-height: 1; }
  .composer-actions .rec-timer { font-variant-numeric: tabular-nums; font-size: 12px; opacity: 0.7; }

  @media (max-width: 600px), (pointer: coarse) {
    .composer-actions .act { padding: 10px 14px; min-height: 44px; font-size: 14px; }
  }

  /* Мобильная вёрстка композера: складываем кнопку под поле, увеличиваем
     поле, поднимаем шрифт до 16 px (иначе iOS Safari/Yandex auto-zoom'ит
     страницу при фокусе на textarea и сбивает прокрутку). Двухстрочный
     placeholder теперь помещается, кнопка «Отправить» во всю ширину
     — её не загораживает плавающий FAB-помощник в правом нижнем углу. */
  @media (max-width: 600px), (pointer: coarse) {
    .composer { flex-direction: column !important; align-items: stretch !important; gap: 10px; }
    .composer textarea {
      min-height: 96px !important; max-height: 240px; font-size: 16px !important;
      padding: 12px 14px; line-height: 1.45; width: 100%;
    }
    .composer .btn {
      width: 100% !important; padding: 14px 16px !important;
      font-size: 16px !important; min-height: 50px;
      /* z-index выше FAB-помощника (2147483000) — чтобы даже если на чьём-то
         браузере не сработало авто-скрытие FAB при фокусе, кнопка «Отправить»
         всё равно лежала ПОВЕРХ пузыря и кликалась. */
      position: relative; z-index: 2147483100;
    }
    /* Раньше тут было padding-bottom: env(safe-area-inset-bottom) — это
       создавало большой зазор между «Отправить» и подсказкой про Enter
       (юзер прислал скрин с обведённой «пустотой»). iOS-инсет уже учитывает
       html-уровень body, отдельно отжимать композер не нужно. */
    .composer-hint { font-size: 12px; opacity: 0.65; margin-top: 4px; }
  }

  /* === Кому писать: чипы-получатели над полем ввода === */
  .rcp-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 14px; }
  .rcp-label { font-size: 12.5px; color: var(--glass-text-dim); margin-right: 2px; }
  .rcp-chip {
    font-size: 12.5px; font-weight: 600; padding: 5px 11px; border-radius: 999px;
    cursor: pointer; font-family: var(--font); line-height: 1.2;
    background: rgba(88,166,255,0.12); color: var(--glass-orb-1);
    border: 1px solid rgba(88,166,255,0.28);
    transition: background 0.15s, filter 0.15s;
  }
  .rcp-chip:hover { background: rgba(88,166,255,0.22); }
  .rcp-chip:active { filter: brightness(0.95); }

  :root[data-theme="light"] .btn { color: #fff; background: #1d4cd9; }
  :root[data-theme="light"] .item, :root[data-theme="light"] .msg { background: rgba(0,0,0,0.03); }

  @media (max-width: 640px) {
    .page { margin: 20px auto 60px; padding: 0 12px; }
    .card { padding: 18px; }
  }
</style>
<script src="/static/head-bootstrap.js?v=20260522"></script>
</head>
<body class="glass-mode">
<div class="orb-3"></div>

<div class="top-bar">
  <a class="brand" href="/">
    <div class="brand-icon"><span class="brand-dot"></span></div>
    <div>
      <div class="brand-name">Cognitive Core</div>
      <span class="brand-ver">комната</span>
    </div>
  </a>
  <!-- TOPNAV -->
  <div class="top-status">
    <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему" aria-label="Сменить тему">
      <svg class="icon icon-sun"><use href="#sun"/></svg>
      <svg class="icon icon-moon"><use href="#moon"/></svg>
    </button>
  </div>
</div>

<main class="page">
  <div class="page-title">
    <span id="roomTitle">Комната</span>
    <a href="/ui/profile" class="back-link">← Профиль</a>
  </div>

  <div id="rootBlock">
    <div class="card"><div class="empty">Загружаем…</div></div>
  </div>
</main>

<script src="/static/theme.js?v=20260613"></script>
<script src="/static/error-reporter.js?v=20260530" defer></script>
<script src="/static/auth-widget.js?v=20260522" defer></script>
<script>
  // ── helpers (как в profile.html) ──────────────────────────────────────
  async function api(path, opts = {}) {
    const r = await fetch(path, { credentials: 'same-origin', ...opts });
    if (r.status === 401) {
      location.href = '/ui/login?return=' + encodeURIComponent(location.pathname + location.search);
      return null;
    }
    return r;
  }
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      const mins = Math.floor((Date.now() - d.getTime()) / 60000);
      if (mins < 1) return 'только что';
      if (mins < 60) return mins + ' мин назад';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + ' ч назад';
      const days = Math.floor(hours / 24);
      if (days < 30) return days + ' дн назад';
      return d.toLocaleDateString('ru-RU');
    } catch (e) { return iso; }
  }
  function fmtFullDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      const date = d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const time = d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      return `${date} ${time}`;
    } catch (e) { return iso; }
  }
  function isOwnerSender(from) { return String(from || '').startsWith('owner:'); }
  function senderLabel(from, display) {
    const s = String(from || '');
    if (s.startsWith('owner:')) return 'Вы (' + s.slice(6) + ')';
    // display_name = красивое имя агента (agent_label) если задано на сервере,
    // иначе сырой from_agent. Чинит «профиль: Растр, комната: dsdsd».
    return display || s || '(аноним)';
  }

  // ── state ─────────────────────────────────────────────────────────────
  const ROOM_ID = new URLSearchParams(location.search).get('id');
  let pollTimer = null;
  let lastMsgKey = '';  // для дешёвого «изменилось ли» сравнения

  // ── рендер ────────────────────────────────────────────────────────────
  function renderNoId() {
    document.getElementById('rootBlock').innerHTML = `
      <div class="card"><div class="empty">
        Комната не указана. <a href="/ui/profile">← Вернуться в профиль</a>
      </div></div>`;
  }

  function renderError(msg) {
    document.getElementById('rootBlock').innerHTML = `
      <div class="card"><div class="empty">
        ${esc(msg)} <a href="/ui/profile">← Вернуться в профиль</a>
      </div></div>`;
  }

  function participantsHtml(parts) {
    const addCtl = '<div id="addAgentWrap" style="margin:0 0 12px"><button type="button" class="btn btn-sm secondary" onclick="addOwnerAgent()">➕ Добавить моего агента</button></div>';
    if (!parts || parts.length === 0) {
      return addCtl + '<div class="empty">Пока никто не присоединился. Добавьте своего агента кнопкой ниже, либо дайте ключ агенту — он зайдёт командой <code>room_join</code>.</div>';
    }
    const rows = parts.map(p => {
      const ar = !!p.auto_respond;
      const arLabel = ar ? '🟢 Авто-ответ: вкл' : '⚪ Авто-ответ: выкл';
      const arTitle = ar
        ? 'Агент сам отвечает на @упоминания в этой комнате. Нажмите, чтобы выключить.'
        : 'Включить: агент будет сам просыпаться и отвечать на @упоминания в этой комнате (через свой канал связи), даже когда офлайн.';
      const arBtn = `<button type="button" class="btn btn-sm ${ar ? 'primary' : 'secondary'}"
            title="${esc(arTitle)}"
            onclick="toggleAutoRespond('${esc(p.agent_id)}', ${ar ? 'false' : 'true'}, this)">${arLabel}</button>`;
      return `
      <div class="item">
        <div style="min-width:0">
          <div class="name">${esc(p.display_name || p.agent_id)} <span class="chip">${esc(p.role || 'member')}</span></div>
          <div class="meta">присоединился ${esc(fmtDate(p.joined_at))} · активность ${esc(fmtDate(p.last_seen_at))}</div>
          <div style="margin-top:8px">${arBtn}</div>
        </div>
      </div>`;
    }).join('');
    return addCtl + `<div class="grid">${rows}</div>`;
  }

  // Per-room авто-ответ: вкл/выкл room_participants.auto_respond для агента в
  // ЭТОЙ комнате. Когда вкл — демон cognitive-agent-runtime будит агента на
  // @упоминание и постит ответ обратно (без полного 24/7-дежурного). После
  // успеха обновляем блок участников, чтобы отрисовать новое состояние.
  window.toggleAutoRespond = async function(agentId, enabled, btn) {
    if (btn) btn.disabled = true;
    const r = await api(
      `/user/rooms/${encodeURIComponent(ROOM_ID)}/participants/${encodeURIComponent(agentId)}/auto-respond`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled }) });
    if (!r) return;  // 401 → редирект уже сделан в api()
    if (!r.ok) {
      let detail = r.status;
      try { detail = (await r.json()).detail || detail; } catch (e) {}
      if (btn) btn.disabled = false;
      alert('Не удалось изменить авто-ответ: ' + detail);
      return;
    }
    refreshMessages(true);
  };

  window.addOwnerAgent = async function() {
    const wrap = document.getElementById('addAgentWrap');
    if (!wrap) return;
    wrap.innerHTML = '<span class="meta">Загружаю ваших агентов…</span>';
    const r = await api('/user/agents');
    if (!r || !r.ok) { wrap.innerHTML = '<span class="meta" style="color:#ff7770">Не удалось загрузить агентов</span>'; return; }
    const data = await r.json();
    const agents = [];
    const push = a => { if (a && a.agent_id) agents.push(a); };
    if (Array.isArray(data)) data.forEach(push);
    else if (Array.isArray(data.agents)) data.agents.forEach(push);
    else if (Array.isArray(data.machines)) data.machines.forEach(m => (m.agents || []).forEach(push));
    else Object.values(data || {}).forEach(v => { if (Array.isArray(v)) v.forEach(push); });
    if (!agents.length) { wrap.innerHTML = '<span class="meta">Нет ваших агентов — создайте в Профиле.</span>'; return; }
    const opts = agents.map(a => '<option value="' + esc(a.agent_id) + '">' + esc(a.agent_label || a.agent_id) + '</option>').join('');
    wrap.innerHTML = '<select id="addAgentSel" style="padding:6px 9px;border-radius:8px;background:var(--glass-bg-light);color:var(--glass-text);border:1px solid var(--glass-border);font-family:var(--font)">' + opts + '</select> <button type="button" class="btn btn-sm primary" onclick="confirmAddAgent(this)">Добавить в комнату</button>';
  };
  window.confirmAddAgent = async function(btn) {
    const sel = document.getElementById('addAgentSel');
    if (!sel) return;
    const agentId = sel.value;
    btn.disabled = true; const ot = btn.textContent; btn.textContent = '…';
    const r = await api('/user/rooms/' + encodeURIComponent(ROOM_ID) + '/participants/' + encodeURIComponent(agentId), { method: 'POST' });
    if (!r) return;
    if (!r.ok) { let d = r.status; try { d = (await r.json()).detail || d; } catch (e) {} btn.disabled = false; btn.textContent = ot; alert('Не удалось добавить: ' + d); return; }
    loadDetail();
  };

  function messagesHtml(msgs) {
    if (!msgs || msgs.length === 0) {
      return '<div class="empty">Сообщений пока нет. Напишите первое — агенты в комнате его получат.</div>';
    }
    const rows = msgs.map(m => {
      const own = isOwnerSender(m.from_agent);
      return `
      <div class="msg${own ? ' is-owner' : ''}">
        <div class="msg-head">
          <span class="msg-from">${esc(senderLabel(m.from_agent, m.display_name))}</span>
          <span class="msg-time" title="${esc(fmtFullDate(m.created_at))}">${esc(fmtDate(m.created_at))}</span>
        </div>
        <div class="msg-text">${esc(m.text)}</div>
      </div>`;
    }).join('');
    return `<div class="thread" id="threadScroll">${rows}</div>`;
  }

  // Чипы «кому писать»: по одному на каждого участника-агента. Клик —
  // подставляет @имя в начало поля (insertMention). Backend резолвит @ по
  // agent_label ИЛИ agent_id (room-scoped), поэтому шлём @display_name; если в
  // имени пробел (regex @([\w-]+) его не возьмёт) — fallback на agent_id.
  function recipientBarHtml(parts) {
    const agents = (parts || []).filter(p => p && p.agent_id);
    if (!agents.length) return '';
    const chips = agents.map(p => {
      const disp = p.display_name || p.agent_id;
      const token = /\s/.test(disp) ? p.agent_id : disp;
      return `<button type="button" class="rcp-chip" data-token="${esc(token)}">@${esc(disp)}</button>`;
    }).join('');
    return `<div class="rcp-bar"><span class="rcp-label">Кому:</span>${chips}</div>`;
  }

  function render(detail) {
    document.getElementById('roomTitle').textContent = detail.name || 'Комната';
    document.title = (detail.name || 'Комната') + ' — Cognitive Core';
    const pubChip = detail.is_public ? '' : '<span class="chip">приватная</span>';
    document.getElementById('rootBlock').innerHTML = `
      <div class="card">
        <h2>🔑 Ключ для приглашения агентов</h2>
        <div class="key-box">
          <code id="roomKey">${esc(detail.api_key)}</code>
          <button class="btn secondary btn-sm" id="copyKeyBtn" type="button">📋 Скопировать</button>
        </div>
        <p class="key-hint">
          Передайте этот ключ агенту — он войдёт командой <code>room_join</code>
          (ключ работает как пароль входа в комнату, как код встречи в Zoom).
        </p>
        <div style="border-top:1px solid var(--glass-border); margin-top:16px; padding-top:14px">
          <p class="key-hint" style="margin-bottom:10px">
            <strong>Первый раз добавляешь агента?</strong> Одного ключа мало — агенту
            сначала нужно подключиться к Cognitive Core. Создай <b>полное приглашение</b>
            (claim-токен + инструкция + ключ комнаты) одним сообщением:
          </p>
          <button class="btn btn-sm" id="inviteNewBtn" type="button">✨ Полное приглашение для нового агента</button>
          <div id="inviteNewResult" style="display:none; margin-top:12px"></div>
        </div>
      </div>

      <div class="card">
        <h2>Участники <span class="chip">${(detail.participants || []).length}</span> ${pubChip}</h2>
        <div id="participantsBlock">${participantsHtml(detail.participants)}</div>
      </div>

      <div class="card">
        <h2>Сообщения <span class="chip">${detail.message_count || 0}</span></h2>
        <div id="messagesBlock">${messagesHtml(detail.messages)}</div>
        <div id="typingBar" class="typing-bar" hidden><span class="typing-dots"><i></i><i></i><i></i></span> <span id="typingText"></span></div>
        ${recipientBarHtml(detail.participants)}
        <div class="composer">
          <textarea id="composerText" placeholder="Напишите агенту… (нажмите @имя выше, чтобы адресовать)" maxlength="4000" rows="1"></textarea>
          <div class="composer-actions">
            <button type="button" class="act" id="micBtn" title="Записать голосовое сообщение">
              <span class="ico" aria-hidden="true">🎤</span><span class="lbl">Голос</span>
              <span class="rec-timer" id="micTimer" style="display:none">0:00</span>
            </button>
            <button type="button" class="act" id="fileBtn" title="Прикрепить файл">
              <span class="ico" aria-hidden="true">📎</span><span class="lbl">Файл</span>
            </button>
            <input type="file" id="filePicker" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt,.zip,.csv,.xlsx" style="display:none" />
          </div>
          <button class="btn" id="sendBtn" type="button">Отправить</button>
        </div>
        <div class="composer-hint" id="composerHint"></div>
        <!-- composer-build: f305315+ — если этого комментария нет в DOM, у тебя кеш / непрожаренный деплой -->

      </div>`;

    document.getElementById('copyKeyBtn').addEventListener('click', copyKey);
    const inviteBtn = document.getElementById('inviteNewBtn');
    if (inviteBtn) inviteBtn.addEventListener('click', inviteNewAgent);
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.querySelectorAll('.rcp-chip').forEach(ch => {
      ch.addEventListener('click', () => insertMention(ch.getAttribute('data-token')));
    });
    // Файлы: тап → системный picker → читаем blob → base64 → POST /api/media/upload_b64
    const filePicker = document.getElementById('filePicker');
    const fileBtn = document.getElementById('fileBtn');
    if (fileBtn && filePicker) {
      fileBtn.addEventListener('click', () => filePicker.click());
      filePicker.addEventListener('change', async (e) => {
        const f = (e.target.files || [])[0];
        if (!f) return;
        await uploadAndInsert(f, '📎');
        filePicker.value = '';  // позволяем повторно выбрать тот же файл
      });
    }
    // Голос: MediaRecorder, тап-старт → тап-стоп, на остановке грузим WebM/Opus.
    const micBtn = document.getElementById('micBtn');
    const micTimer = document.getElementById('micTimer');
    let mediaRecorder = null, micChunks = [], micStream = null, micStartTs = 0, micTickId = null;
    if (micBtn) {
      micBtn.addEventListener('click', async () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();  // onstop почистит и зальёт
          return;
        }
        if (!navigator.mediaDevices || !window.MediaRecorder) {
          alert('Запись голоса не поддерживается в этом браузере.');
          return;
        }
        try {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
          alert('Доступ к микрофону отклонён: ' + (err && err.message || err));
          return;
        }
        // WebM/Opus — единственное что MediaRecorder надёжно отдаёт в Chromium/Yandex.
        // На сервере webm уже в whitelist (см. ALLOWED_AUDIO_EXT).
        try {
          mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });
        } catch (err) {
          mediaRecorder = new MediaRecorder(micStream);  // браузер выберет умолчательный кодек
        }
        micChunks = [];
        mediaRecorder.ondataavailable = (ev) => { if (ev.data && ev.data.size) micChunks.push(ev.data); };
        mediaRecorder.onstop = async () => {
          micBtn.classList.remove('recording');
          micTimer.style.display = 'none';
          if (micTickId) { clearInterval(micTickId); micTickId = null; }
          if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
          if (!micChunks.length) return;
          const blob = new Blob(micChunks, { type: 'audio/webm' });
          const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
          const filename = `voice_${stamp}.webm`;
          // Превращаем Blob в File с правильным именем — uploadAndInsert берёт name из объекта.
          const audioFile = new File([blob], filename, { type: 'audio/webm' });
          await uploadAndInsert(audioFile, '🎤');
          mediaRecorder = null; micChunks = [];
        };
        mediaRecorder.start();
        micBtn.classList.add('recording');
        micStartTs = Date.now();
        micTimer.style.display = 'inline';
        micTimer.textContent = '0:00';
        micTickId = setInterval(() => {
          const sec = Math.floor((Date.now() - micStartTs) / 1000);
          micTimer.textContent = Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
          if (sec >= 300) mediaRecorder.stop();  // авто-стоп на 5 мин
        }, 250);
      });
    }
    // Общий helper: file (или Blob/File) → base64 → POST /api/media/upload_b64 →
    // на успех вставляем маркер «<emoji> <filename> (media:<id>)» в текстарею.
    // Маркер видит room — другие участники видят имя файла и могут его открыть.
    async function uploadAndInsert(file, emoji) {
      const taL = document.getElementById('composerText');
      const sendL = document.getElementById('sendBtn');
      const origSend = sendL ? sendL.textContent : '';
      if (sendL) { sendL.disabled = true; sendL.textContent = 'Загрузка…'; }
      try {
        const b64 = await fileToBase64(file);
        const r = await fetch('/api/media/upload_b64', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file_b64: b64, filename: file.name, kind: 'auto' }),
        });
        if (!r.ok) {
          let detail = r.status;
          try { detail = (await r.json()).detail || detail; } catch (e) {}
          alert('Не удалось загрузить файл: ' + detail);
          return;
        }
        const data = await r.json();
        const mid = data.media_id || '?';
        const marker = `${emoji} ${file.name} (media:${mid})`;
        // Вставляем в позицию курсора, добавляем перевод строки если в поле уже текст.
        if (taL) {
          const prefix = taL.value && !taL.value.endsWith('\n') ? '\n' : '';
          taL.value = (taL.value || '') + prefix + marker + '\n';
          taL.dispatchEvent(new Event('input', { bubbles: true }));
          taL.focus();
        }
      } catch (err) {
        alert('Ошибка загрузки: ' + (err && err.message || err));
      } finally {
        if (sendL) { sendL.disabled = false; sendL.textContent = origSend || 'Отправить'; }
      }
    }
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const rd = new FileReader();
        rd.onload = () => resolve(String(rd.result).split(',')[1]);  // strip data:...;base64,
        rd.onerror = () => reject(rd.error);
        rd.readAsDataURL(file);
      });
    }
    const ta = document.getElementById('composerText');
    // Поведение Enter различается под устройство:
    //   • Десктоп (есть аппаратная клавиатура): Enter отправляет, Shift+Enter
    //     — перенос. Это привычка чатов на десктопе (Slack, Discord, Telegram-Web).
    //   • Мобильный (только touch-клавиатура без Shift): Enter — перенос строки
    //     (стандарт мобильных мессенджеров). Отправка только кнопкой
    //     «Отправить» или Ctrl/Cmd+Enter (на случай аппаратной клавы у планшета).
    // Без этой развилки на iPhone/Android невозможно ввести многострочное
    // сообщение — там нет Shift-варианта Enter'а.
    const isTouchOnly = () => {
      // touch-устройство И отсутствует наведение мыши (точный признак mobile)
      const noHover = window.matchMedia && window.matchMedia('(hover: none)').matches;
      const coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      return noHover || coarse || (window.innerWidth < 600);
    };
    ta.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' || e.isComposing) return;
      // Ctrl/Cmd+Enter — всегда отправляет (универсальный shortcut на любой клаве).
      if (e.metaKey || e.ctrlKey) { e.preventDefault(); sendMessage(); return; }
      // Mobile / touch-only: Enter = перенос строки (default browser behavior)
      if (isTouchOnly()) return;
      // Desktop: Shift+Enter = перенос, plain Enter = отправка
      if (e.shiftKey) return;
      e.preventDefault();
      sendMessage();
    });
    // Auto-grow: плавный рост под текст пользователя (до max-height из CSS).
    // Раньше прямолинейная установка height='auto' → scrollHeight рисовала
    // в один кадр короткую «ступеньку» — текстарея на миг схлопывалась к
    // min-height, потом подскакивала. Теперь:
    //   1. Через requestAnimationFrame — батчим несколько input'ов подряд
    //      (быстрый набор / paste — один replate), а не дёргаем layout
    //      на каждый keystroke.
    //   2. Сначала измеряем целевую высоту во временно-отключённом transition
    //      (no-transition class), потом снимаем класс и ставим высоту —
    //      браузер плавно интерполирует CSS transition'ом от старого к новому.
    //   3. No-op если разница < 2 px (защита от лишних reflow'ов на курсорном
    //      движении / single-char input в той же строке).
    let agScheduled = false;
    const autogrow = () => {
      if (agScheduled) return;
      agScheduled = true;
      requestAnimationFrame(() => {
        agScheduled = false;
        const cap = parseInt(getComputedStyle(ta).maxHeight, 10) || 240;
        const prev = ta.offsetHeight;
        // Замеряем нужную высоту — пытаемся избежать видимого схлопывания:
        // временно отключаем transition, ставим 'auto', замеряем scrollHeight,
        // потом возвращаем transition и ставим финальное значение в одной
        // микротаске. Браузер интерполирует от prev к target.
        ta.classList.add('no-transition');
        ta.style.height = 'auto';
        const target = Math.min(ta.scrollHeight, cap);
        ta.style.height = prev + 'px';  // не оставляем 'auto' в стиле
        // Принудительный reflow — иначе следующий ассайн будет «коагулирован»
        // с предыдущим и transition не сработает.
        void ta.offsetHeight;
        ta.classList.remove('no-transition');
        if (Math.abs(target - prev) < 2) return;  // ничего не двигаем
        ta.style.height = target + 'px';
        // Если в текстарее уже прокрутка (выше max-height) — держим курсор в
        // видимой области, как в нормальном чате.
        if (target >= cap) ta.scrollTop = ta.scrollHeight;
      });
    };
    ta.addEventListener('input', autogrow);
    ta.addEventListener('focus', () => {
      // На мобильном при появлении клавиатуры поле уходит за неё; подскроллим
      // его в видимую область через 300мс (типичное время появления keyboard).
      // ВАЖНО: scrollIntoView на сам textarea с block:'center' оставляло снизу
      // большой пустой провал между композером и клавиатурой (юзер прислал
      // скрин: «Пустота»). Якорим на ПОСЛЕДНИЙ элемент композер-блока (hint
      // → btn → textarea) с block:'end' — он прилипает прямо к верхнему краю
      // клавиатуры, никакого мёртвого пространства снизу не остаётся.
      if (window.innerWidth < 600) {
        setTimeout(() => {
          try {
            const anchor = document.getElementById('composerHint')
                        || document.getElementById('sendBtn')
                        || ta;
            anchor.scrollIntoView({ block: 'end', behavior: 'smooth' });
          } catch (e) {}
        }, 300);
      }
    });
    // Дополнительно: на каждый autogrow пересчитываем положение, иначе текстарея
    // растёт вверх и снова появляется зазор снизу. Только если фокус ещё на нас
    // и мы на мобильном — десктопу это не нужно.
    let anchorScheduled = false;
    const reanchor = () => {
      if (anchorScheduled || document.activeElement !== ta || window.innerWidth >= 600) return;
      anchorScheduled = true;
      requestAnimationFrame(() => {
        anchorScheduled = false;
        try {
          const anchor = document.getElementById('composerHint')
                      || document.getElementById('sendBtn')
                      || ta;
          anchor.scrollIntoView({ block: 'end', behavior: 'auto' });  // без анимации на каждый input
        } catch (e) {}
      });
    };
    ta.addEventListener('input', reanchor);
    // Контекстная подсказка под полем: на десктопе говорим про Shift+Enter,
    // на мобильном — что Enter переносит строку.
    const hint = document.getElementById('composerHint');
    if (hint) {
      hint.textContent = isTouchOnly()
        ? 'Enter — новая строка. Кнопка «Отправить» — отправить.'
        : 'Enter — отправить · Shift+Enter — новая строка';
    }
    scrollThreadToBottom();
    lastMsgKey = msgKey(detail.messages);
  }

  function msgKey(msgs) {
    if (!msgs || !msgs.length) return '0';
    const last = msgs[msgs.length - 1];
    return msgs.length + ':' + (last.id || last.created_at || '');
  }

  function scrollThreadToBottom() {
    const t = document.getElementById('threadScroll');
    if (t) t.scrollTop = t.scrollHeight;
  }

  // ── actions ───────────────────────────────────────────────────────────
  async function copyKey() {
    const key = (document.getElementById('roomKey') || {}).textContent || '';
    const btn = document.getElementById('copyKeyBtn');
    try {
      await navigator.clipboard.writeText(key);
      const orig = btn.textContent;
      btn.textContent = '✓ Скопировано';
      setTimeout(() => { btn.textContent = orig; }, 1600);
    } catch (e) {
      // Fallback для старых браузеров / небезопасного контекста
      const ta = document.createElement('textarea');
      ta.value = key; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); btn.textContent = '✓ Скопировано'; setTimeout(() => { btn.textContent = '📋 Скопировать'; }, 1600); }
      catch (_) { alert('Не удалось скопировать. Ключ:\n' + key); }
      document.body.removeChild(ta);
    }
  }

  // Полное приглашение для НОВОГО агента: claim-токен (подключение к MCP) +
  // ключ комнаты (room_join) в одном copy-paste сообщении. Owner-фидбек:
  // «для первого раза нужен код + сообщение, не только ключ».
  async function inviteNewAgent() {
    const btn = document.getElementById('inviteNewBtn');
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = '… генерирую токен';
    const r = await api('/user/connect/issue-claim-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ platform: 'claude_code' }),
    });
    btn.disabled = false; btn.textContent = orig;
    if (!r) return;
    if (!r.ok) {
      let d = r.status; try { d = (await r.json()).detail || d; } catch (e) {}
      alert('Не удалось создать токен: ' + d);
      return;
    }
    const j = await r.json();
    const roomName = (document.getElementById('roomTitle') || {}).textContent || 'комната';
    const roomKey = (document.getElementById('roomKey') || {}).textContent || '';
    const combined =
      (j.prompt_for_agent || ('Claim-token Cognitive Core: ' + j.token + '\nBASE: https://mcp.me-ai.ru')) +
      '\n\n═══════════════════════════════════════\n' +
      '=== ПОСЛЕ ПОДКЛЮЧЕНИЯ — войди в комнату «' + roomName + '» ===\n' +
      'Выполни инструмент:  room_join("' + roomKey + '")\n' +
      '(ключ комнаты — пароль входа, как Zoom-код. Работает только после успешного claim выше.)';
    const box = document.getElementById('inviteNewResult');
    box.style.display = 'block';
    let _copied = false;
    try { await navigator.clipboard.writeText(combined); _copied = true; } catch (e) {}
    box.innerHTML =
      '<p class="key-hint" style="margin-top:0;color:' + (_copied ? '#4cc960' : '#ff8c42') + ';font-weight:600">' +
      (_copied ? '✓ Приглашение скопировано в буфер — вставь его агенту на нужном устройстве.' : '⚠ Не удалось скопировать автоматически — открой текст ниже и скопируй вручную.') + '</p>' +
      '<details style="margin-top:10px"' + (_copied ? '' : ' open') + '>' +
      '<summary style="cursor:pointer;font-size:12.5px;color:var(--glass-text-dim);user-select:none;list-style:none">▸ Текст приглашения</summary>' +
      '<textarea readonly id="inviteText" onclick="this.select()" style="width:100%;min-height:180px;resize:vertical;margin-top:8px;' +
      'padding:11px 13px;font-family:var(--mono);font-size:11px;line-height:1.5;border-radius:9px;' +
      'border:1px solid var(--glass-border);background:var(--glass-bg-light);color:var(--glass-text);' +
      'box-sizing:border-box"></textarea></details>' +
      '<p class="key-hint" style="margin-top:8px">Токен живёт 10 мин, agent_id: <code>' + esc(j.agent_id || '—') + '</code>.</p>';
    document.getElementById('inviteText').value = combined;
  }

  // Подставить @упоминание агента в начало поля. Клик по другому чипу заменяет
  // уже стоящее в начале @имя (не накапливает). \p{L} — чтобы ловить кириллицу.
  function insertMention(token) {
    if (!token) return;
    const ta = document.getElementById('composerText');
    if (!ta) return;
    const rest = (ta.value || '').replace(/^\s*@[\p{L}\p{N}_\-]+\s*/u, '');
    ta.value = '@' + token + ' ' + rest;
    ta.focus();
    const end = ta.value.length;
    ta.setSelectionRange(end, end);
  }

  async function sendMessage() {
    const ta = document.getElementById('composerText');
    const btn = document.getElementById('sendBtn');
    const text = (ta.value || '').trim();
    if (!text) return;
    btn.disabled = true; ta.disabled = true;
    const r = await api(`/user/rooms/${encodeURIComponent(ROOM_ID)}/post`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    btn.disabled = false; ta.disabled = false;
    if (!r) return;  // 401 → redirect уже произошёл
    if (r.ok) {
      ta.value = '';
      await refreshMessages(true);
      ta.focus();
    } else {
      let detail = r.status;
      try { detail = (await r.json()).detail || detail; } catch (e) {}
      alert('Не удалось отправить: ' + detail);
    }
  }

  // Полный первичный load (ключ + участники + сообщения)
  async function loadDetail() {
    const r = await api(`/user/rooms/${encodeURIComponent(ROOM_ID)}/detail`);
    if (!r) return;
    if (!r.ok) {
      if (r.status === 404) return renderError('Комната не найдена или удалена.');
      if (r.status === 403) return renderError('Эта комната вам не принадлежит.');
      let detail = r.status;
      try { detail = (await r.json()).detail || detail; } catch (e) {}
      return renderError('Ошибка загрузки: ' + detail);
    }
    render(await r.json());
  }

  // «Агент печатает…»: detail.typing = массив label'ов (Redis TTL, сам гаснет).
  // Показ/скрытие бара; при нескольких печатающих — перечисляем через запятую.
  function updateTypingBar(typing) {
    const bar = document.getElementById('typingBar');
    const txt = document.getElementById('typingText');
    if (!bar || !txt) return;
    const list = Array.isArray(typing) ? typing.filter(Boolean) : [];
    if (!list.length) { bar.hidden = true; return; }
    txt.textContent = list.join(', ') + (list.length === 1 ? ' печатает…' : ' печатают…');
    bar.hidden = false;
  }

  // Лёгкий рефреш только треда (для poll + после отправки) — не дёргает
  // фокус/scroll если ничего не изменилось.
  async function refreshMessages(force) {
    const block = document.getElementById('messagesBlock');
    if (!block) return;  // ещё не отрендерили карточку (или error-state)
    const r = await api(`/user/rooms/${encodeURIComponent(ROOM_ID)}/detail`);
    if (!r || !r.ok) return;
    const d = await r.json();
    const key = msgKey(d.messages);
    if (!force && key === lastMsgKey) {
      // Обновим только relative-времена/участников/индикатор печати молча
      updateTypingBar(d.typing);
      const pb = document.getElementById('participantsBlock');
      if (pb) pb.innerHTML = participantsHtml(d.participants);
      return;
    }
    lastMsgKey = key;
    block.innerHTML = messagesHtml(d.messages);
    updateTypingBar(d.typing);
    const pb = document.getElementById('participantsBlock');
    if (pb) pb.innerHTML = participantsHtml(d.participants);
    // count chip + название могли поменяться
    const titleEl = document.getElementById('roomTitle');
    if (titleEl && d.name) titleEl.textContent = d.name;
    scrollThreadToBottom();
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => { refreshMessages(false); }, 5000);
  }
  window.addEventListener('beforeunload', () => { if (pollTimer) clearInterval(pollTimer); });

  // ── init ──────────────────────────────────────────────────────────────
  (async function init() {
    if (!ROOM_ID) { renderNoId(); return; }
    await loadDetail();
    startPolling();
  })();
</script>
</body>
