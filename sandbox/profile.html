<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Профиль — AImail</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a73e8'/%3E%3Ctext x='50%25' y='58%25' font-size='34' font-weight='700' fill='white' text-anchor='middle' font-family='system-ui'%3EA%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #1a73e8;
      --accent-hover: #1557b0;
      --border: #e5e7eb;
      --error: #d93025;
      --success: #1e8e3e;
      --chip-bg: #eef3fc;
      --chip-text: #1557b0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.2px;
    }
    header nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 18px;
      font-size: 14px;
    }
    header nav a:hover { color: var(--text); }
    main {
      max-width: 880px;
      margin: 28px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 17px;
      color: var(--text);
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f1f3f5;
    }
    .row:last-child { border-bottom: none; }
    .row .k { color: var(--muted); font-size: 14px; }
    .row .v { font-size: 14px; color: var(--text); font-weight: 500; }
    .chip {
      display: inline-block;
      padding: 2px 10px;
      background: var(--chip-bg);
      color: var(--chip-text);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 6px;
    }
    .chip.admin { background: #fff7e6; color: #a05a00; }
    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 14px 0;
      text-align: center;
    }
    button, .btn {
      font-size: 14px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      display: inline-block;
    }
    button.secondary, .btn.secondary {
      background: #f0f2f5;
      color: var(--text);
    }
    button.danger { background: #fce8e6; color: var(--error); }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button.secondary:hover { background: #e4e7eb; }
    button:disabled { opacity: 0.55; cursor: progress; }
    .grid {
      display: grid;
      gap: 10px;
    }
    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px 14px;
      background: #fafbfc;
      border-radius: 10px;
      align-items: center;
    }
    .item .name {
      font-weight: 600;
      font-size: 14.5px;
    }
    .item .meta {
      font-size: 12.5px;
      color: var(--muted);
      margin-top: 2px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    dialog {
      border: none;
      border-radius: 14px;
      padding: 24px;
      width: min(95%, 420px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    }
    dialog::backdrop { background: rgba(0,0,0,0.4); }
    dialog h3 { margin: 0 0 12px; font-size: 18px; }
    dialog label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }
    dialog input, dialog textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: inherit;
    }
    .api-key-display {
      background: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 10px;
      padding: 14px;
      margin-top: 14px;
      font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
      font-size: 13px;
      word-break: break-all;
      line-height: 1.4;
    }
    .msg-line {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
    @media (max-width: 600px) {
      header { padding: 12px 14px; }
      header nav a { margin-left: 12px; }
      main { padding: 0 10px; }
      .card { padding: 16px; }
      .row .v { max-width: 60%; text-align: right; word-break: break-word; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">AImail · Профиль</div>
    <nav>
      <a href="/ui/rooms">Комнаты</a>
      <a href="/ui/ask">Спросить</a>
      <a href="#" id="logoutLink">Выйти</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h2>Мой аккаунт</h2>
      <div id="meBlock" class="empty">Загружаем…</div>
    </div>

    <div class="card">
      <h2>Мои комнаты</h2>
      <div id="roomsBlock" class="empty">Загружаем…</div>
    </div>

    <div class="card">
      <h2>
        Мои помощники
        <button id="newAgentBtn" class="secondary" style="float: right; padding: 6px 12px; font-size: 13px;">
          + Добавить
        </button>
      </h2>
      <div id="agentsBlock" class="empty">Загружаем…</div>
    </div>

    <div class="card">
      <h2>Мои устройства</h2>
      <div id="sessionsBlock" class="empty">Загружаем…</div>
    </div>

    <div class="card" style="text-align: center;">
      <button class="danger" id="deleteAccountBtn">Удалить аккаунт</button>
      <p class="msg-line">Аккаунт помечается на удаление. Можно восстановить в течение 30 дней.</p>
    </div>
  </main>

  <dialog id="newAgentDialog">
    <h3>Новый помощник</h3>
    <form id="newAgentForm">
      <label for="newAgentId">Идентификатор (латиница, цифры, дефис)</label>
      <input id="newAgentId" name="agent_id" required pattern="[a-zA-Z0-9._\-]+" maxlength="64">

      <label for="newAgentDesc">Описание (опц.)</label>
      <input id="newAgentDesc" name="description" maxlength="300">

      <label for="newAgentProject">Проект (опц.)</label>
      <input id="newAgentProject" name="project" maxlength="64">

      <label for="newAgentMachine">Машина (опц.)</label>
      <input id="newAgentMachine" name="machine" maxlength="128" placeholder="ноутбук-mocar / сервер-prod">

      <div class="toolbar">
        <button type="button" class="secondary" onclick="document.getElementById('newAgentDialog').close()">Отмена</button>
        <button type="submit">Создать</button>
      </div>
      <div id="newAgentResult" style="display: none;"></div>
    </form>
  </dialog>

  <script>
    // ─── Помощники для запросов
    async function api(path, opts = {}) {
      const r = await fetch(path, { credentials: 'same-origin', ...opts });
      if (r.status === 401) {
        location.href = '/ui/login?return=' + encodeURIComponent(location.pathname);
        return null;
      }
      return r;
    }

    async function loadMe() {
      const r = await api('/user/me');
      if (!r) return;
      const data = await r.json();
      const adminChip = data.is_admin ? '<span class="chip admin">Админ</span>' : '';
      const verifiedChip = data.email_verified ? '<span class="chip">Подтверждён</span>' : '';
      document.getElementById('meBlock').outerHTML = `
        <div id="meBlock">
          <div class="row"><span class="k">Почта</span>
            <span class="v">${escape(data.email)} ${verifiedChip} ${adminChip}</span></div>
          <div class="row"><span class="k">Имя</span>
            <span class="v">${escape(data.display_name || '—')}</span></div>
          <div class="row"><span class="k">user_id</span>
            <span class="v" style="font-family: monospace; font-size: 12px;">${escape(data.user_id)}</span></div>
          <div class="row"><span class="k">Создан</span>
            <span class="v">${fmtDate(data.created_at)}</span></div>
        </div>`;
    }

    async function loadRooms() {
      const r = await api('/user/rooms');
      if (!r) return;
      const j = await r.json();
      const block = document.getElementById('roomsBlock');
      if (j.count === 0) {
        block.outerHTML = '<div id="roomsBlock" class="empty">У вас пока нет комнат. <a href="/ui/rooms">Создать первую →</a></div>';
        return;
      }
      const grid = j.items.map(r => `
        <div class="item">
          <div>
            <div class="name">${escape(r.name || '(без названия)')}</div>
            <div class="meta">${r.is_owner ? 'владелец' : 'участник'} · ${fmtDate(r.created_at)} ${r.is_public ? '' : '· приватная'}</div>
          </div>
          <a href="/ui/rooms?id=${encodeURIComponent(r.id)}" class="btn secondary">Открыть</a>
        </div>`).join('');
      block.outerHTML = `<div id="roomsBlock" class="grid">${grid}</div>`;
    }

    async function loadAgents() {
      const r = await api('/user/agents');
      if (!r) return;
      const j = await r.json();
      const block = document.getElementById('agentsBlock');
      if (j.count === 0) {
        block.outerHTML = '<div id="agentsBlock" class="empty">Помощников пока нет. Нажмите «+ Добавить».</div>';
        return;
      }
      const grid = j.items.map(a => {
        const online = a.last_heartbeat_at && (Date.now() - Date.parse(a.last_heartbeat_at)) < 90000;
        return `
        <div class="item">
          <div>
            <div class="name">${escape(a.agent_id)} ${online ? '<span class="chip" style="background:#e6f4ea;color:#1e8e3e;">онлайн</span>' : ''}</div>
            <div class="meta">${escape(a.project || '—')} · ${escape(a.machine || '—')} · ${a.total_events || 0} событий</div>
          </div>
          <span class="meta">${a.last_heartbeat_at ? fmtDate(a.last_heartbeat_at) : 'никогда'}</span>
        </div>`;
      }).join('');
      block.outerHTML = `<div id="agentsBlock" class="grid">${grid}</div>`;
    }

    async function loadSessions() {
      const r = await api('/auth/sessions');
      if (!r) return;
      const j = await r.json();
      const block = document.getElementById('sessionsBlock');
      if (j.count === 0) {
        block.outerHTML = '<div id="sessionsBlock" class="empty">—</div>';
        return;
      }
      const grid = j.items.map(s => {
        const ua = (s.device_info && s.device_info.user_agent) || '?';
        const uaShort = ua.length > 60 ? ua.slice(0, 60) + '…' : ua;
        const ip = (s.device_info && s.device_info.ip) || '?';
        return `
        <div class="item">
          <div>
            <div class="name">${s.is_current ? '<span class="chip">Это устройство</span> ' : ''}${escape(uaShort)}</div>
            <div class="meta">IP ${escape(ip)} · был ${fmtDate(s.last_used_at)}</div>
          </div>
          ${s.is_current ? '' : `<button class="secondary" onclick="revokeSession('${escape(s.session_id)}')">Выйти</button>`}
        </div>`;
      }).join('');
      block.outerHTML = `<div id="sessionsBlock" class="grid">${grid}
        <div style="text-align: right; margin-top: 8px;">
          <button class="secondary" onclick="logoutAll()">Выйти отовсюду</button>
        </div></div>`;
    }

    async function revokeSession(sid) {
      if (!confirm('Завершить эту сессию?')) return;
      await api('/auth/sessions/' + encodeURIComponent(sid), { method: 'DELETE' });
      loadSessions();
    }

    async function logoutAll() {
      if (!confirm('Выйти со всех устройств, включая это?')) return;
      await api('/auth/logout/all', { method: 'POST' });
      location.href = '/ui/login';
    }

    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await api('/auth/logout', { method: 'POST' });
      location.href = '/ui/login';
    });

    document.getElementById('newAgentBtn').addEventListener('click', () => {
      document.getElementById('newAgentDialog').showModal();
    });

    document.getElementById('newAgentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        agent_id: form.agent_id.value.trim(),
        description: form.description.value.trim() || null,
        project: form.project.value.trim() || null,
        machine: form.machine.value.trim() || null,
      };
      const r = await api('/user/agents/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!r) return;
      const j = await r.json();
      const result = document.getElementById('newAgentResult');
      if (r.ok && j.api_key) {
        result.style.display = 'block';
        result.innerHTML = `
          <p style="margin: 14px 0 6px; color: #1e8e3e; font-weight: 600;">Готово! Ваш API key:</p>
          <div class="api-key-display">${escape(j.api_key)}</div>
          <p class="msg-line">⚠ Сохраните этот ключ — больше его показать нельзя.</p>
          <div class="toolbar">
            <button onclick="copyKey(this, '${escape(j.api_key)}')">Скопировать</button>
            <button class="secondary" onclick="document.getElementById('newAgentDialog').close(); location.reload();">Готово</button>
          </div>`;
      } else {
        result.style.display = 'block';
        result.innerHTML = `<p style="color: #d93025; margin: 14px 0;">${escape(j.detail || 'Ошибка')}</p>`;
      }
    });

    function copyKey(btn, key) {
      navigator.clipboard.writeText(key)
        .then(() => { btn.textContent = '✓ Скопировано'; })
        .catch(() => { btn.textContent = 'Не получилось — скопируйте вручную'; });
    }

    document.getElementById('deleteAccountBtn').addEventListener('click', async () => {
      if (!confirm('Точно удалить аккаунт? Можно восстановить в течение 30 дней.')) return;
      const r = await api('/user/account', { method: 'DELETE' });
      if (!r) return;
      alert('Аккаунт помечен на удаление. Сейчас вы будете разлогинены.');
      await api('/auth/logout', { method: 'POST' });
      location.href = '/ui/login';
    });

    // ─── Утилиты
    function escape(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        const days = Math.floor((Date.now() - d.getTime()) / 86400000);
        if (days < 1) {
          const hours = Math.floor((Date.now() - d.getTime()) / 3600000);
          if (hours < 1) {
            const mins = Math.floor((Date.now() - d.getTime()) / 60000);
            return mins < 1 ? 'только что' : mins + ' мин назад';
          }
          return hours + ' ч назад';
        }
        if (days < 30) return days + ' дн назад';
        return d.toLocaleDateString('ru-RU');
      } catch (e) { return iso; }
    }

    // Старт
    loadMe();
    loadRooms();
    loadAgents();
    loadSessions();
  </script>
</body>
</html>
