<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Профиль — Cognitive Core</title>
<meta name="color-scheme" content="dark">
<meta name="darkreader-lock">
<meta name="theme-color" content="#0a0e14">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2358a6ff'/%3E%3Ctext x='50%25' y='58%25' font-size='34' font-weight='700' fill='white' text-anchor='middle' font-family='system-ui'%3EC%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/shared.css?v=20260520j">
<link rel="stylesheet" href="/static/glass.css?v=20260520i">
<style>
  html, body { background: var(--glass-base-bg) !important; color: var(--glass-text) !important; }
  body { min-height: 100vh; }

  .page { max-width: 920px; margin: 32px auto 80px; padding: 0 20px; position: relative; z-index: 1; }
  .page-title {
    font-size: 13px; font-weight: 600; letter-spacing: 1.6px;
    color: var(--glass-text-dim); text-transform: uppercase;
    margin: 0 0 22px; padding: 0 6px;
  }

  .card {
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--apple-radius);
    box-shadow: var(--glass-shadow);
    padding: 24px 28px; margin-bottom: 18px;
  }
  .card h2 {
    margin: 0 0 16px; font-size: 16px; font-weight: 600;
    color: var(--glass-text);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }

  .row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 0; border-bottom: 1px solid var(--glass-border); gap: 16px;
  }
  .row:last-child { border-bottom: none; }
  .row .k { color: var(--glass-text-dim); font-size: 13.5px; }
  .row .v { font-size: 14px; color: var(--glass-text); font-weight: 500; text-align: right; max-width: 65%; word-break: break-word; }

  .chip {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; margin-left: 6px;
    background: rgba(88,166,255,0.15); color: var(--glass-orb-1);
    border: 1px solid rgba(88,166,255,0.25);
  }
  .chip.admin { background: rgba(255,140,66,0.15); color: var(--glass-orb-3); border-color: rgba(255,140,66,0.25); }
  .chip.online { background: rgba(63,185,80,0.15); color: #4cc960; border-color: rgba(63,185,80,0.25); }

  .empty {
    color: var(--glass-text-dim); font-size: 14px;
    padding: 18px 0; text-align: center;
  }
  .empty a { color: var(--glass-orb-1); text-decoration: none; }
  .empty a:hover { text-decoration: underline; }

  .btn {
    font-size: 13.5px; font-weight: 600; padding: 8px 14px;
    border-radius: 9px; border: 0; cursor: pointer;
    background: var(--glass-orb-1); color: #0a0e14;
    text-decoration: none; display: inline-block;
    transition: filter 0.15s; font-family: var(--font);
  }
  .btn:hover:not(:disabled) { filter: brightness(1.1); }
  .btn.secondary {
    background: var(--glass-bg-light); color: var(--glass-text);
    border: 1px solid var(--glass-border);
  }
  .btn.secondary:hover:not(:disabled) { background: rgba(255,255,255,0.06); }
  .btn.danger {
    background: rgba(248,81,73,0.15); color: #ff7770;
    border: 1px solid rgba(248,81,73,0.3);
  }
  .btn.danger:hover:not(:disabled) { background: rgba(248,81,73,0.25); }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }
  .btn:disabled { opacity: 0.55; cursor: progress; }

  .grid { display: grid; gap: 10px; }
  .item {
    display: grid; grid-template-columns: 1fr auto; gap: 14px;
    padding: 14px 16px; background: var(--glass-bg-light);
    border: 1px solid var(--glass-border); border-radius: 14px;
    align-items: center;
  }
  .item .name { font-weight: 600; font-size: 14.5px; color: var(--glass-text); }
  .item .meta { font-size: 12.5px; color: var(--glass-text-dim); margin-top: 3px; }

  .toolbar { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; flex-wrap: wrap; }

  dialog {
    border: 1px solid var(--glass-border); background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
    border-radius: var(--apple-radius); padding: 28px;
    width: min(95%, 460px); color: var(--glass-text);
    box-shadow: var(--glass-shadow-lg);
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
  dialog h3 { margin: 0 0 14px; font-size: 18px; font-weight: 600; }
  dialog label {
    display: block; font-size: 11.5px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--glass-text-dim);
    margin: 12px 0 5px; font-weight: 600;
  }
  dialog input {
    width: 100%; padding: 11px 13px; font-size: 14px;
    border-radius: 9px; border: 1px solid var(--glass-border);
    background: var(--glass-bg-light); color: var(--glass-text);
    font-family: var(--font);
  }
  dialog input:focus { outline: none; border-color: var(--glass-orb-1); }

  .api-key-display {
    background: rgba(255,140,66,0.08);
    border: 1px solid rgba(255,140,66,0.25);
    border-radius: 10px; padding: 13px 16px; margin-top: 14px;
    font-family: var(--mono); font-size: 12.5px;
    word-break: break-all; line-height: 1.5; color: var(--glass-text);
  }
  .msg-line { font-size: 12.5px; color: var(--glass-text-dim); margin-top: 10px; }

  :root[data-theme="light"] .btn { color: #fff; background: #1d4cd9; }
  :root[data-theme="light"] .item { background: rgba(0,0,0,0.03); }

  @media (max-width: 640px) {
    .page { margin: 20px auto 60px; padding: 0 12px; }
    .card { padding: 18px; }
  }
</style>
</head>
<body class="glass-mode">
<div class="orb-3"></div>

<div class="top-bar">
  <a class="brand" href="/">
    <div class="brand-icon"><span class="brand-dot"></span></div>
    <div>
      <div class="brand-name">Cognitive Core</div>
      <span class="brand-ver">профиль</span>
    </div>
  </a>
  <nav class="top-nav">
    <a href="/">Главная</a>
    <a href="/ui/team">AI-чат</a>
    <a href="/ui">Комнаты</a>
    <a href="/ui/profile" class="active">Профиль</a>
    <a href="/sandbox">API</a>
  </nav>
  <div class="top-status">
    <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему" aria-label="Сменить тему">
      <svg class="icon icon-sun"><use href="#sun"/></svg>
      <svg class="icon icon-moon"><use href="#moon"/></svg>
    </button>
    <button class="btn secondary btn-sm" id="logoutBtn">Выйти</button>
  </div>
</div>

<main class="page">
  <div class="page-title">Мой профиль</div>

  <div class="card">
    <h2>Аккаунт</h2>
    <div id="meBlock" class="empty">Загружаем…</div>
  </div>

  <div class="card">
    <h2>Мои комнаты</h2>
    <div id="roomsBlock" class="empty">Загружаем…</div>
  </div>

  <div class="card">
    <h2>
      Мои помощники
      <button id="newAgentBtn" class="btn secondary btn-sm">+ Добавить</button>
    </h2>
    <div id="agentsBlock" class="empty">Загружаем…</div>
  </div>

  <div class="card">
    <h2>Мои устройства</h2>
    <div id="sessionsBlock" class="empty">Загружаем…</div>
  </div>

  <div class="card" style="text-align: center;">
    <button class="btn danger" id="deleteAccountBtn">Удалить аккаунт</button>
    <p class="msg-line">Аккаунт помечается на удаление. Можно восстановить в течение 30 дней.</p>
  </div>
</main>

<dialog id="newAgentDialog">
  <h3>Новый помощник</h3>
  <form id="newAgentForm">
    <label for="newAgentId">Идентификатор (латиница, цифры, дефис)</label>
    <input id="newAgentId" name="agent_id" required pattern="[a-zA-Z0-9._\-]+" maxlength="64">
    <label for="newAgentDesc">Описание</label>
    <input id="newAgentDesc" name="description" maxlength="300">
    <label for="newAgentProject">Проект</label>
    <input id="newAgentProject" name="project" maxlength="64">
    <label for="newAgentMachine">Машина</label>
    <input id="newAgentMachine" name="machine" maxlength="128" placeholder="ноутбук-mocar / сервер-prod">
    <div class="toolbar">
      <button type="button" class="btn secondary btn-sm" onclick="document.getElementById('newAgentDialog').close()">Отмена</button>
      <button type="submit" class="btn btn-sm">Создать</button>
    </div>
    <div id="newAgentResult" style="display: none;"></div>
  </form>
</dialog>

<script src="/static/theme.js?v=20260520"></script>
<script src="/static/error-reporter.js?v=20260520d" defer></script>
<script src="/static/auth-widget.js?v=20260520i" defer></script>
<script>
  async function api(path, opts = {}) {
    const r = await fetch(path, { credentials: 'same-origin', ...opts });
    if (r.status === 401) {
      location.href = '/ui/login?return=' + encodeURIComponent(location.pathname);
      return null;
    }
    return r;
  }
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      const mins = Math.floor((Date.now() - d.getTime()) / 60000);
      if (mins < 1) return 'только что';
      if (mins < 60) return mins + ' мин назад';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + ' ч назад';
      const days = Math.floor(hours / 24);
      if (days < 30) return days + ' дн назад';
      return d.toLocaleDateString('ru-RU');
    } catch (e) { return iso; }
  }

  async function loadMe() {
    const r = await api('/user/me');
    if (!r) return;
    const data = await r.json();
    const adminChip = data.is_admin ? '<span class="chip admin">Админ</span>' : '';
    const verifiedChip = data.email_verified ? '<span class="chip">Подтверждён</span>' : '';
    document.getElementById('meBlock').outerHTML = `
      <div id="meBlock">
        <div class="row"><span class="k">Почта</span>
          <span class="v">${esc(data.email)} ${verifiedChip} ${adminChip}</span></div>
        <div class="row"><span class="k">Имя</span>
          <span class="v">${esc(data.display_name || '—')}</span></div>
        <div class="row"><span class="k">user_id</span>
          <span class="v" style="font-family: var(--mono); font-size: 12px;">${esc(data.user_id)}</span></div>
        <div class="row"><span class="k">Создан</span>
          <span class="v">${fmtDate(data.created_at)}</span></div>
      </div>`;
  }

  async function loadRooms() {
    const r = await api('/user/rooms');
    if (!r) return;
    const j = await r.json();
    const block = document.getElementById('roomsBlock');
    if (j.count === 0) {
      block.outerHTML = '<div id="roomsBlock" class="empty">У вас пока нет комнат. <a href="/ui">Создать первую →</a></div>';
      return;
    }
    const grid = j.items.map(r => `
      <div class="item">
        <div>
          <div class="name">${esc(r.name || '(без названия)')}</div>
          <div class="meta">${r.is_owner ? 'владелец' : 'участник'} · ${fmtDate(r.created_at)} ${r.is_public ? '' : '· приватная'}</div>
        </div>
        <a href="/ui?id=${encodeURIComponent(r.id)}" class="btn secondary btn-sm">Открыть</a>
      </div>`).join('');
    block.outerHTML = `<div id="roomsBlock" class="grid">${grid}</div>`;
  }

  async function loadAgents() {
    const r = await api('/user/agents');
    if (!r) return;
    const j = await r.json();
    const block = document.getElementById('agentsBlock');
    if (j.count === 0) {
      block.outerHTML = '<div id="agentsBlock" class="empty">Помощников пока нет. Нажмите «+ Добавить».</div>';
      return;
    }
    const grid = j.items.map(a => {
      const online = a.last_heartbeat_at && (Date.now() - Date.parse(a.last_heartbeat_at)) < 90000;
      return `
      <div class="item">
        <div>
          <div class="name">${esc(a.agent_id)} ${online ? '<span class="chip online">онлайн</span>' : ''}</div>
          <div class="meta">${esc(a.project || '—')} · ${esc(a.machine || '—')} · ${a.total_events || 0} событий</div>
        </div>
        <span class="meta">${a.last_heartbeat_at ? fmtDate(a.last_heartbeat_at) : 'никогда'}</span>
      </div>`;
    }).join('');
    block.outerHTML = `<div id="agentsBlock" class="grid">${grid}</div>`;
  }

  async function loadSessions() {
    const r = await api('/auth/sessions');
    if (!r) return;
    const j = await r.json();
    const block = document.getElementById('sessionsBlock');
    if (j.count === 0) { block.outerHTML = '<div id="sessionsBlock" class="empty">—</div>'; return; }
    const grid = j.items.map(s => {
      const ua = (s.device_info && s.device_info.user_agent) || '?';
      const uaShort = ua.length > 60 ? ua.slice(0, 60) + '…' : ua;
      const ip = (s.device_info && s.device_info.ip) || '?';
      return `
      <div class="item">
        <div>
          <div class="name">${s.is_current ? '<span class="chip">Это устройство</span> ' : ''}${esc(uaShort)}</div>
          <div class="meta">IP ${esc(ip)} · был ${fmtDate(s.last_used_at)}</div>
        </div>
        ${s.is_current ? '' : `<button class="btn secondary btn-sm" onclick="revokeSession('${esc(s.session_id)}')">Выйти</button>`}
      </div>`;
    }).join('');
    block.outerHTML = `<div id="sessionsBlock" class="grid">${grid}
      <div style="text-align: right; margin-top: 8px;">
        <button class="btn secondary btn-sm" onclick="logoutAll()">Выйти отовсюду</button>
      </div></div>`;
  }

  async function revokeSession(sid) {
    if (!confirm('Завершить эту сессию?')) return;
    await api('/auth/sessions/' + encodeURIComponent(sid), { method: 'DELETE' });
    loadSessions();
  }
  async function logoutAll() {
    if (!confirm('Выйти со всех устройств, включая это?')) return;
    await api('/auth/logout/all', { method: 'POST' });
    location.href = '/ui/login';
  }
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await api('/auth/logout', { method: 'POST' });
    location.href = '/ui/login';
  });
  document.getElementById('newAgentBtn').addEventListener('click', () => {
    document.getElementById('newAgentDialog').showModal();
  });
  document.getElementById('newAgentForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
      agent_id: form.agent_id.value.trim(),
      description: form.description.value.trim() || null,
      project: form.project.value.trim() || null,
      machine: form.machine.value.trim() || null,
    };
    const r = await api('/user/agents/create', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!r) return;
    const j = await r.json();
    const result = document.getElementById('newAgentResult');
    if (r.ok && j.api_key) {
      result.style.display = 'block';
      result.innerHTML = `
        <p style="margin: 14px 0 6px; color: #4cc960; font-weight: 600;">Готово! Ваш API key:</p>
        <div class="api-key-display">${esc(j.api_key)}</div>
        <p class="msg-line">⚠ Сохраните этот ключ — больше его показать нельзя.</p>
        <div class="toolbar">
          <button class="btn btn-sm" onclick="copyKey(this, '${esc(j.api_key)}')">Скопировать</button>
          <button class="btn secondary btn-sm" onclick="document.getElementById('newAgentDialog').close(); location.reload();">Готово</button>
        </div>`;
    } else {
      result.style.display = 'block';
      result.innerHTML = `<p style="color: #ff7770; margin: 14px 0;">${esc(j.detail || 'Ошибка')}</p>`;
    }
  });
  function copyKey(btn, key) {
    navigator.clipboard.writeText(key)
      .then(() => { btn.textContent = '✓ Скопировано'; })
      .catch(() => { btn.textContent = 'Не получилось — скопируйте вручную'; });
  }
  document.getElementById('deleteAccountBtn').addEventListener('click', async () => {
    if (!confirm('Точно удалить аккаунт? Можно восстановить в течение 30 дней.')) return;
    const r = await api('/user/account', { method: 'DELETE' });
    if (!r) return;
    alert('Аккаунт помечен на удаление. Сейчас вы будете разлогинены.');
    await api('/auth/logout', { method: 'POST' });
    location.href = '/ui/login';
  });

  loadMe(); loadRooms(); loadAgents(); loadSessions();
</script>
</body>
</html>
