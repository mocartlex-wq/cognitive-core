<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Чат — Cognitive Core</title>
<link rel="stylesheet" href="/static/shared.css?v=20260520j">
<link rel="stylesheet" href="/static/glass.css?v=20260613">
<style>
  .chat-wrap{max-width:820px;margin:0 auto;padding:0 12px}
  .chat-head{display:flex;gap:10px;align-items:center;margin:18px 0 12px}
  .chat-head h1{font-size:20px;margin:0;flex:0 0 auto}
  #roomSel{flex:1;min-width:0;padding:9px 12px;border-radius:12px;font-size:15px;
    background:rgba(255,255,255,.05);color:var(--text,#fff);
    border:1px solid rgba(255,255,255,.12)}
  .chat-card{border-radius:18px;overflow:hidden;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
    display:flex;flex-direction:column;height:min(66vh,620px)}
  #log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:3px}
  .who{font-size:11px;opacity:.55;margin:10px 0 2px 12px}
  .row{display:flex;margin:1px 0}
  .row.me{justify-content:flex-end}
  .bubble{max-width:74%;padding:9px 14px;border-radius:18px;font-size:15px;
    line-height:1.4;white-space:pre-wrap;word-wrap:break-word;animation:pop .18s ease-out}
  .them .bubble{background:rgba(255,255,255,.08);border-bottom-left-radius:5px}
  .me .bubble{background:#0a84ff;color:#fff;border-bottom-right-radius:5px}
  @keyframes pop{from{transform:scale(.97);opacity:.5}to{transform:scale(1);opacity:1}}
  .composer{display:flex;gap:8px;padding:10px;border-top:1px solid rgba(255,255,255,.08)}
  #box{flex:1;resize:none;min-height:40px;max-height:130px;border-radius:14px;padding:10px 14px;
    font-size:16px;font-family:inherit;line-height:1.35;background:rgba(255,255,255,.05);
    color:var(--text,#fff);border:1px solid rgba(255,255,255,.12);outline:none}
  #send{flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:none;background:#0a84ff;
    color:#fff;font-size:19px;cursor:pointer;transition:opacity .15s}
  #send:disabled{opacity:.35;cursor:default}
  .hint{text-align:center;opacity:.5;font-size:12px;margin:8px 0 20px}
  .empty{margin:auto;opacity:.5;font-size:14px;text-align:center}
</style>
</head>
<body>
<!-- TOPNAV -->

<main class="chat-wrap">
  <div class="chat-head">
    <h1>💬 Чат</h1>
    <select id="roomSel" aria-label="Комната"></select>
  </div>

  <div class="chat-card glass">
    <div id="log"><div class="empty">Загрузка…</div></div>
    <div class="composer">
      <textarea id="box" rows="1" placeholder="Сообщение… (@Память чтобы адресовать)" enterkeyhint="send"></textarea>
      <button id="send" disabled title="Отправить">↑</button>
    </div>
  </div>
  <div class="hint">Пишешь от своего имени. Ответит агент, если он на связи (@имя — адресно, без @ — дирижёру).</div>
</main>

<script>
const log = document.getElementById('log');
const box = document.getElementById('box');
const send = document.getElementById('send');
const roomSel = document.getElementById('roomSel');
let roomId = null;
const seen = new Set();
const J = {credentials:'include'};
const H = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const isMe = a => (a||'').startsWith('owner');

async function loadRooms(){
  try{
    const r = await fetch('/user/rooms', J);
    if(r.status===401){ location.href='/ui/login?return=/chat'; return; }
    const d = await r.json();
    const items = d.items||[];
    roomSel.innerHTML = items.map(x=>`<option value="${x.id}">${H(x.name)}</option>`).join('');
    if(items.length){ roomId = items[0].id; roomSel.value = roomId; await refresh(true); }
    else log.innerHTML = '<div class="empty">Нет комнат. Создай в Профиле.</div>';
  }catch(e){ log.innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
}

function render(m){
  if(seen.has(m.id)) return false;
  seen.add(m.id);
  const mine = isMe(m.from_agent);
  if(!mine){
    const prev = log.lastElementChild;
    if(!prev || prev.dataset.who !== m.from_agent){
      const w=document.createElement('div'); w.className='who';
      w.textContent = m.display_name || m.from_agent; log.appendChild(w);
    }
  }
  const row=document.createElement('div');
  row.className='row '+(mine?'me':'them'); row.dataset.who=m.from_agent;
  row.innerHTML='<div class="bubble">'+H(m.text)+'</div>';
  log.appendChild(row);
  return true;
}

async function refresh(reset){
  if(!roomId) return;
  try{
    const r = await fetch(`/user/rooms/${roomId}/detail`, J);
    if(!r.ok) return;
    const d = await r.json();
    const msgs = d.messages||[];
    if(reset){ log.innerHTML=''; seen.clear(); }
    let added=false;
    msgs.forEach(m=>{ if(render(m)) added=true; });
    if(!log.children.length) log.innerHTML='<div class="empty">Пока пусто — напиши первым</div>';
    if(added || reset) log.scrollTop=log.scrollHeight;
  }catch(e){}
}

async function submit(){
  const t=box.value.trim(); if(!t||!roomId) return;
  box.value=''; autosize(); send.disabled=true;
  try{
    await fetch(`/user/rooms/${roomId}/post`,{...J,method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});
  }catch(e){}
  setTimeout(()=>refresh(false), 400);
}

function autosize(){ box.style.height='auto'; box.style.height=Math.min(box.scrollHeight,130)+'px'; }
box.addEventListener('input',()=>{ autosize(); send.disabled=!box.value.trim(); });
box.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submit(); }});
send.addEventListener('click',submit);
roomSel.addEventListener('change',()=>{ roomId=roomSel.value; refresh(true); });

loadRooms();
setInterval(()=>refresh(false), 4000);
</script>
<script src="/static/theme.js?v=20260613"></script>
</body>
</html>
