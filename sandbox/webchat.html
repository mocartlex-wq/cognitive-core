<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Память">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0b0f">
<meta name="application-name" content="Память">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
<title>Память — Cognitive Core</title>
<style>
  /* ── iOS 18 «Сообщения» ─────────────────────────────────────────────── */
  :root{
    --sent:#0a84ff; --recv:#26262b; --recv-t:#fff; --chatbg:#000;
    --ink:#fff; --mut:#8a93a6; --hair:rgba(255,255,255,.08);
    --panel:rgba(20,20,22,.72);
    --sysfont:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--chatbg);font-family:var(--sysfont);
    color:var(--ink);-webkit-font-smoothing:antialiased}

  .app{max-width:820px;margin:0 auto;height:100vh;height:100dvh;
    display:flex;flex-direction:column;background:var(--chatbg);overflow:hidden}

  /* Экраны-вкладки */
  .view{flex:1 1 auto;min-height:0;display:none;flex-direction:column}
  .view.active{display:flex}

  /* Хедеры */
  .vhead{flex:0 0 auto;display:flex;align-items:center;gap:8px;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 9px;
    background:var(--panel);backdrop-filter:saturate(180%) blur(22px);
    -webkit-backdrop-filter:saturate(180%) blur(22px);border-bottom:.5px solid var(--hair)}
  .vhead>b{font-size:19px;font-weight:700}
  .chat-head .back{flex:0 0 auto;width:34px;height:34px;display:flex;align-items:center;
    justify-content:center;font-size:28px;line-height:1;background:none;border:none;
    color:var(--sent);cursor:pointer;padding:0}
  .chat-head .peer{flex:1;min-width:0;display:flex;align-items:center;gap:9px;justify-content:center}
  .chat-head .ava{width:32px;height:32px;border-radius:50%;flex:0 0 auto;display:flex;
    align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,#5e5ce6,#0a84ff)}
  .chat-head .ttl{min-width:0;text-align:center}
  .chat-head .ttl b{display:block;font-size:16px;line-height:1.1;font-weight:600}
  .chat-head .ttl small{font-size:11.5px;color:#30d158}
  .chat-head .ttl small::before{content:'●';font-size:8px;margin-right:3px;vertical-align:1px}
  .hspace{flex:0 0 auto;width:34px}

  /* ── Лента чата ── */
  #log{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 8px;
    display:flex;flex-direction:column;gap:2px}
  .who{font-size:11px;opacity:.5;margin:12px 0 3px 14px;font-weight:500}
  .row{display:flex;margin:1px 0}
  .row.me{justify-content:flex-end}
  .bubble{position:relative;max-width:75%;padding:8px 14px;font-size:16px;line-height:1.35;
    white-space:pre-wrap;word-wrap:break-word;border-radius:19px;
    animation:pop .22s cubic-bezier(.2,.9,.3,1.3)}
  .them .bubble{background:var(--recv);color:var(--recv-t)}
  .me .bubble{background:var(--sent);color:#fff}
  .them .bubble::before{content:'';position:absolute;bottom:0;left:-7px;width:14px;height:19px;
    background:var(--recv);border-bottom-right-radius:16px}
  .them .bubble::after{content:'';position:absolute;bottom:0;left:-11px;width:11px;height:19px;
    background:var(--chatbg);border-bottom-right-radius:12px}
  .me .bubble::before{content:'';position:absolute;bottom:0;right:-7px;width:14px;height:19px;
    background:var(--sent);border-bottom-left-radius:16px}
  .me .bubble::after{content:'';position:absolute;bottom:0;right:-11px;width:11px;height:19px;
    background:var(--chatbg);border-bottom-left-radius:12px}
  .row.grp .bubble::before,.row.grp .bubble::after{display:none}
  @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
  .typing .bubble{padding:12px 15px}
  .dots{display:inline-flex;gap:4px}
  .dots i{width:7px;height:7px;border-radius:50%;background:#8e8e93;display:block;animation:tp 1.3s infinite}
  .dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
  @keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  .media-link{color:inherit;text-decoration:underline;font-weight:600;opacity:.95}
  .empty{margin:auto;opacity:.45;font-size:14px;text-align:center;padding:0 24px}

  /* Композер */
  .composer{flex:0 0 auto;display:flex;gap:8px;align-items:flex-end;padding:8px 10px;
    background:var(--panel);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border-top:.5px solid var(--hair)}
  .icon-btn{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:none;background:transparent;
    color:var(--sent);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  .icon-btn.recording{color:#ff453a;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #micTimer{font-size:11px;margin-left:1px;color:#ff453a}
  #box{flex:1;resize:none;min-height:36px;max-height:120px;border-radius:18px;padding:8px 14px;
    font-size:16px;font-family:inherit;line-height:1.3;background:rgba(255,255,255,.08);
    color:var(--ink);border:.5px solid var(--hair);outline:none}
  #box::placeholder{color:#8e8e93}
  #send{flex:0 0 auto;width:36px;height:36px;border-radius:50%;border:none;background:var(--sent);
    color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:transform .12s,opacity .12s;
    display:flex;align-items:center;justify-content:center}
  #send:disabled{opacity:0;transform:scale(.5);pointer-events:none;width:0;margin:0}

  /* ── Комнаты ── */
  .rlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .rrow{display:flex;gap:12px;align-items:center;padding:12px 14px;cursor:pointer;
    border-bottom:.5px solid var(--hair)}
  .rrow:active{background:rgba(255,255,255,.06)}
  .rav{width:46px;height:46px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;
    justify-content:center;font-size:16px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,#5e5ce6,#0a84ff)}
  .rmain{flex:1;min-width:0}
  .rname{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rlast{font-size:13.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .rarr{flex:0 0 auto;color:var(--mut);font-size:20px}

  /* ── Профиль ── */
  .pbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 14px}
  .pcard{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;
    background:rgba(255,255,255,.05);margin-bottom:20px}
  .pav{width:58px;height:58px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;
    justify-content:center;font-size:22px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,#5e5ce6,#0a84ff)}
  .pname{font-size:19px;font-weight:700}
  .pmeta{font-size:13.5px;color:var(--mut);margin-top:3px}
  .pgrp{border-radius:14px;overflow:hidden;background:rgba(255,255,255,.05);margin-bottom:18px}
  .prow{display:flex;align-items:center;gap:12px;padding:14px 15px;border-bottom:.5px solid var(--hair);
    font-size:15.5px}
  .prow:last-child{border-bottom:none}
  .prow.btn{cursor:pointer}.prow.btn:active{background:rgba(255,255,255,.06)}
  .prow .pl{flex:1;display:flex;align-items:center;gap:11px}
  .prow .pic{width:22px;text-align:center}
  .prow .pval{color:var(--mut);font-size:14px}
  .prow .parr{color:var(--mut);font-size:18px}
  .prow.danger{color:#ff453a}
  .toggle{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,.18);position:relative;
    cursor:pointer;transition:background .2s;flex:0 0 auto}
  .toggle:after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;
    background:#fff;transition:transform .2s}
  .toggle.on{background:#30d158}.toggle.on:after{transform:translateX(18px)}

  /* ── Таб-бар ── */
  .tabbar{flex:0 0 auto;display:flex;background:rgba(18,18,20,.92);
    backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);
    border-top:.5px solid var(--hair);padding-bottom:env(safe-area-inset-bottom,0px)}
  .tab{flex:1;text-align:center;padding:8px 0 5px;font-size:22px;color:var(--mut);
    background:none;border:none;cursor:pointer;font-family:inherit}
  .tab span{display:block;font-size:10px;margin-top:1px}
  .tab.active{color:var(--sent)}
  .tab .badge{display:none}

  /* ── Светлая тема ── */
  .app.light{--chatbg:#fff;--recv:#e5e5ea;--recv-t:#000;--ink:#000;--mut:#6b7280;
    --panel:rgba(245,245,247,.86);--hair:rgba(0,0,0,.08)}
  .app.light .tabbar{background:rgba(245,245,247,.92)}
  .app.light #box{background:rgba(0,0,0,.05)}
  .app.light .pcard,.app.light .pgrp{background:rgba(0,0,0,.05)}
  .app.light .rrow:active,.app.light .prow.btn:active{background:rgba(0,0,0,.05)}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ЧАТ -->
  <section class="view chat-head-view active" id="vChat">
    <header class="vhead chat-head">
      <button class="back" id="toRooms" title="К комнатам">‹</button>
      <div class="peer">
        <div class="ava" id="chatAva">🧠</div>
        <div class="ttl"><b id="chatName">Чат</b><small id="chatStatus">агенты на связи</small></div>
      </div>
      <span class="hspace"></span>
    </header>
    <div id="log"><div class="empty">Загрузка…</div></div>
    <div class="composer">
      <input type="file" id="filePicker" hidden>
      <button id="fileBtn" class="icon-btn" title="Прикрепить файл">📎</button>
      <button id="micBtn" class="icon-btn" title="Записать голос">🎤<span id="micTimer"></span></button>
      <textarea id="box" rows="1" placeholder="Сообщение… (@Память чтобы адресовать)" enterkeyhint="send"></textarea>
      <button id="send" disabled title="Отправить">↑</button>
    </div>
  </section>

  <!-- КОМНАТЫ -->
  <section class="view" id="vRooms">
    <header class="vhead"><b>Комнаты</b></header>
    <div class="rlist" id="rlist"><div class="empty">Загрузка…</div></div>
  </section>

  <!-- ПРОФИЛЬ -->
  <section class="view" id="vProfile">
    <header class="vhead"><b>Профиль</b></header>
    <div class="pbody" id="pbody"><div class="empty">Загрузка…</div></div>
  </section>

  <!-- ТАБ-БАР -->
  <nav class="tabbar">
    <button class="tab active" data-v="vChat" type="button">💬<span>Чат</span></button>
    <button class="tab" data-v="vRooms" type="button">👥<span>Комнаты</span></button>
    <button class="tab" data-v="vProfile" type="button">⚙️<span>Профиль</span></button>
  </nav>
</div>

<script>
const app = document.getElementById('app');
const log = document.getElementById('log');
const box = document.getElementById('box');
const send = document.getElementById('send');
let roomId = null, rooms = [], supportRoomId = null;
const seen = new Set();
const J = {credentials:'include'};
const H = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const isMe = a => (a||'').startsWith('owner');
const initials = s => (s||'?').trim().replace(/^[@#]/,'').slice(0,2).toUpperCase();
// @dsdsd — служебный маршрут-токен техподдержки: в отображении вырезаем.
const renderText = s => H((s||'').replace(/\s*@dsdsd\b/gi,'')).replace(/\(media:([a-f0-9-]{6,})\)/g,
  '<a class="media-link" href="/api/media/info/$1" target="_blank" rel="noopener">открыть ↗</a>');

/* ─── Навигация по вкладкам ─── */
const views = ['vChat','vRooms','vProfile'];
function go(id){
  views.forEach(v=>document.getElementById(v).classList.toggle('active', v===id));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.getAttribute('data-v')===id));
  if(id==='vChat' && roomId) log.scrollTop=log.scrollHeight;
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>go(t.getAttribute('data-v'))));
document.getElementById('toRooms').addEventListener('click',()=>go('vRooms'));

/* ─── Комнаты ─── */
async function loadRooms(){
  try{
    const r = await fetch('/user/rooms', J);
    if(r.status===401){ location.href='/ui/login?return=/chat'; return; }
    const d = await r.json();
    rooms = (d.items||[]).filter(x=>x.is_owner!==false);
    // Комната техподдержки — служебная, прячем её из списка «Комнаты».
    const sr=rooms.find(x=>(x.name||'').indexOf('🛟')===0 || x.name==='Техподдержка');
    supportRoomId = sr ? sr.id : null;
    renderRoomList();
    await autoOpen();
  }catch(e){ document.getElementById('rlist').innerHTML='<div class="empty">Ошибка загрузки комнат</div>'; }
}
// Обычные комнаты (без служебной техподдержки).
function realRooms(){ return rooms.filter(x=> x.id!==supportRoomId && (x.name||'').indexOf('🛟')!==0 && x.name!=='Техподдержка'); }
function renderRoomList(){
  const el = document.getElementById('rlist');
  const list = realRooms();
  if(!list.length){ el.innerHTML='<div class="empty">У тебя пока нет своих комнат.</div>'; return; }
  el.innerHTML = list.map(x=>
    `<div class="rrow" data-id="${x.id}" data-name="${H(x.name)}">
       <div class="rav">${H(initials(x.name))}</div>
       <div class="rmain"><div class="rname">${H(x.name)}</div>
         <div class="rlast">Открыть чат</div></div>
       <span class="rarr">›</span>
     </div>`).join('');
  el.querySelectorAll('.rrow').forEach(row=>row.addEventListener('click',()=>{
    openRoom(row.getAttribute('data-id'), row.getAttribute('data-name'));
  }));
}
// Открыть первую ДОСТУПНУЮ комнату (пропускаем те, что дают 403).
async function autoOpen(){
  for(const it of realRooms()){
    try{ const r=await fetch(`/user/rooms/${it.id}/detail`, J);
      if(r.ok){ setRoom(it.id, it.name); paint(await r.json(), true); return; } }catch(e){}
  }
  roomId=null;
  log.innerHTML='<div class="empty">Нет доступных комнат для чтения. Открой свою в «Комнатах».</div>';
}
function setRoom(id,name){
  roomId=id;
  document.getElementById('chatName').textContent=name||'Чат';
  document.getElementById('chatAva').textContent=initials(name);
  document.getElementById('chatStatus').textContent='агенты на связи';
}
async function openRoom(id,name){
  setRoom(id,name); go('vChat'); seen.clear(); log.innerHTML='<div class="empty">Загрузка…</div>';
  await refresh(true);
}

/* ─── Рендер сообщений ─── */
function lastRow(){ let n=log.lastElementChild; while(n && !n.classList.contains('row')) n=n.previousElementSibling; return n; }
function render(m){
  if(seen.has(m.id)) return false;
  seen.add(m.id); hideTyping();
  const mine=isMe(m.from_agent);
  const prev=lastRow();
  const sameSender = prev && prev.dataset.who===m.from_agent;
  if(!mine && !sameSender){
    const w=document.createElement('div'); w.className='who';
    w.textContent=m.display_name||m.from_agent; log.appendChild(w);
  }
  const row=document.createElement('div');
  row.className='row '+(mine?'me':'them')+(sameSender?' grp':''); row.dataset.who=m.from_agent;
  row.innerHTML='<div class="bubble">'+renderText(m.text)+'</div>';
  log.appendChild(row); return true;
}
function paint(d, reset){
  const msgs=d.messages||[];
  if(reset){ log.innerHTML=''; seen.clear(); }
  let added=false; msgs.forEach(m=>{ if(render(m)) added=true; });
  if(!log.children.length) log.innerHTML='<div class="empty">Пока пусто — напиши первым</div>';
  if(added||reset) log.scrollTop=log.scrollHeight;
}
let typingEl=null, typingTmr=null;
function showTyping(){
  hideTyping();
  typingEl=document.createElement('div'); typingEl.className='row them typing';
  typingEl.innerHTML='<div class="bubble"><span class="dots"><i></i><i></i><i></i></span></div>';
  log.appendChild(typingEl); log.scrollTop=log.scrollHeight;
  typingTmr=setTimeout(hideTyping,30000);
}
function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } if(typingTmr){ clearTimeout(typingTmr); typingTmr=null; } }

async function refresh(reset){
  if(!roomId) return;
  try{
    const r=await fetch(`/user/rooms/${roomId}/detail`, J);
    if(!r.ok){ if(reset) log.innerHTML='<div class="empty">'+
      (r.status===403?'Это чужая комната — доступна только владельцу. Выбери свою в «Комнатах».'
                     :'Не удалось загрузить ('+r.status+')')+'</div>'; return; }
    paint(await r.json(), reset);
  }catch(e){}
}
async function submit(){
  const t=box.value.trim(); if(!t||!roomId) return;
  box.value=''; autosize(); send.disabled=true;
  // В ветке техподдержки добавляем скрытый @dsdsd — сообщение уходит мне в inbox с уведомлением.
  const out = (roomId===supportRoomId) ? (t+' @dsdsd') : t;
  try{ await fetch(`/user/rooms/${roomId}/post`,{...J,method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({text:out})}); }catch(e){}
  await refresh(false); showTyping(); setTimeout(()=>refresh(false),800);
}

/* ─── Прикрепления ─── */
const fileBtn=document.getElementById('fileBtn'), filePicker=document.getElementById('filePicker');
const micBtn=document.getElementById('micBtn'), micTimer=document.getElementById('micTimer');
function fileToB64(file){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=()=>rej(r.error); r.readAsDataURL(file); }); }
async function uploadAndInsert(file, emoji){
  send.disabled=true; const ph=box.placeholder; box.placeholder='Загрузка…';
  try{
    const b64=await fileToB64(file);
    const r=await fetch('/api/media/upload_b64',{method:'POST',credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({file_b64:b64, filename:file.name, kind:'auto'})});
    if(!r.ok){ let d=r.status; try{ d=(await r.json()).detail||d; }catch(e){} alert('Не удалось загрузить: '+d); return; }
    const mid=(await r.json()).media_id||'?';
    box.value=(box.value?box.value.replace(/\n?$/,'\n'):'')+`${emoji} ${file.name} (media:${mid})`+'\n';
    box.dispatchEvent(new Event('input',{bubbles:true})); box.focus();
  }catch(e){ alert('Ошибка: '+(e&&e.message||e)); }
  finally{ box.placeholder=ph; send.disabled=!box.value.trim(); }
}
fileBtn.addEventListener('click',()=>filePicker.click());
filePicker.addEventListener('change',async e=>{ const f=(e.target.files||[])[0]; if(f) await uploadAndInsert(f,'📎'); filePicker.value=''; });

let rec=null, chunks=[], stream=null, t0=0, tick=null;
micBtn.addEventListener('click',async ()=>{
  if(rec && rec.state==='recording'){ rec.stop(); return; }
  if(!navigator.mediaDevices || !window.MediaRecorder){ alert('Запись не поддерживается'); return; }
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(err){ alert('Микрофон отклонён: '+(err&&err.message||err)); return; }
  try{ rec=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'}); }catch(e){ rec=new MediaRecorder(stream); }
  chunks=[];
  rec.ondataavailable=ev=>{ if(ev.data&&ev.data.size) chunks.push(ev.data); };
  rec.onstop=async ()=>{
    micBtn.classList.remove('recording'); micTimer.textContent='';
    if(tick){ clearInterval(tick); tick=null; }
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
    if(!chunks.length) return;
    const blob=new Blob(chunks,{type:'audio/webm'});
    const stamp=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    await uploadAndInsert(new File([blob],`voice_${stamp}.webm`,{type:'audio/webm'}),'🎤');
    rec=null; chunks=[];
  };
  rec.start(); micBtn.classList.add('recording'); t0=Date.now(); micTimer.textContent='0:00';
  tick=setInterval(()=>{ const s=Math.floor((Date.now()-t0)/1000);
    micTimer.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); if(s>=300) rec.stop(); },250);
});

function autosize(){ box.style.height='auto'; box.style.height=Math.min(box.scrollHeight,130)+'px'; }
box.addEventListener('input',()=>{ autosize(); send.disabled=!box.value.trim(); });
box.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submit(); }});
send.addEventListener('click',submit);

/* ─── Профиль ─── */
let deferredPrompt=null;
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
const isStandalone=matchMedia('(display-mode: standalone)').matches||navigator.standalone===true;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; buildProfile(lastUser); });
let lastUser=null, appVer='';
function themeOn(){ return localStorage.getItem('chat-theme')==='light'; }
function applyTheme(){ app.classList.toggle('light', themeOn()); }
async function loadProfile(){
  try{ const h=await (await fetch('/health',J)).json(); appVer=h.version||''; }catch(e){}
  try{
    const r=await fetch('/user/me', J);
    if(r.status===401){ location.href='/ui/login?return=/chat'; return; }
    lastUser=await r.json();
  }catch(e){ lastUser=null; }
  buildProfile(lastUser);
}
function buildProfile(u){
  const body=document.getElementById('pbody');
  const name=(u&&(u.display_name||u.email))||'Гость';
  const email=(u&&u.email)||'';
  const role=u? (u.is_admin?'Админ':'Владелец') : '';
  const installRow = isStandalone ? '' :
    `<div class="prow btn" id="rInstall"><div class="pl"><span class="pic">📲</span>Установить приложение</div><span class="parr">›</span></div>`;
  body.innerHTML =
    `<div class="pcard">
       <div class="pav">${H(initials(name))}</div>
       <div><div class="pname">${H(name)}</div><div class="pmeta">${H(email)}${role?' · '+role:''}</div></div>
     </div>
     <div class="pgrp">
       <div class="prow"><div class="pl"><span class="pic">🌙</span>Тёмная тема</div>
         <div class="toggle ${themeOn()?'':'on'}" id="rTheme"></div></div>
       ${installRow}
       <div class="prow"><div class="pl"><span class="pic">🔄</span>Версия</div>
         <span class="pval">${appVer?('v'+H(appVer)):'Cognitive Core'}</span></div>
     </div>
     <div class="pgrp">
       <div class="prow btn" id="rSupport"><div class="pl"><span class="pic">🛟</span>Техподдержка</div><span class="parr">›</span></div>
     </div>
     <div class="pgrp">
       <div class="prow btn" id="rSwitch"><div class="pl"><span class="pic">🔀</span>Войти под другим</div><span class="parr">›</span></div>
       <div class="prow btn danger" id="rLogout"><div class="pl"><span class="pic">🚪</span>Выйти</div><span class="parr">›</span></div>
     </div>
     <div class="pmeta" style="text-align:center;margin-top:8px">Cognitive Core · память для AI-агентов</div>`;
  // Тема
  document.getElementById('rTheme').addEventListener('click',()=>{
    localStorage.setItem('chat-theme', themeOn()?'dark':'light'); applyTheme();
    document.getElementById('rTheme').classList.toggle('on', !themeOn());
  });
  // Установка
  const ri=document.getElementById('rInstall');
  if(ri) ri.addEventListener('click',async ()=>{
    if(deferredPrompt){ deferredPrompt.prompt(); try{ await deferredPrompt.userChoice; }catch(e){} deferredPrompt=null; return; }
    if(isIOS){ alert('На iPhone: нажми «Поделиться» внизу Safari → «На экран „Домой“». Иконка появится как «Память».'); return; }
    alert('Открой этот адрес в Chrome (Android) или Safari (iPhone), затем установи из меню браузера.');
  });
  // Аккаунт
  document.getElementById('rSwitch').addEventListener('click',async ()=>{
    if(!confirm('Выйти из текущего аккаунта и войти под другим?')) return;
    try{ await fetch('/auth/logout',{method:'POST',credentials:'include'}); }catch(e){}
    location.href='/ui/login?return=/chat';
  });
  document.getElementById('rLogout').addEventListener('click',async ()=>{
    if(!confirm('Выйти из аккаунта?')) return;
    try{ await fetch('/auth/logout',{method:'POST',credentials:'include'}); }catch(e){}
    location.href='/ui/login';
  });
  const rs=document.getElementById('rSupport');
  if(rs) rs.addEventListener('click',openSupport);
}

/* ─── Техподдержка: отдельная ветка-диалог со мной (не мешается в основной чат) ─── */
async function ensureSupportRoom(){
  if(supportRoomId) return supportRoomId;
  const sr=rooms.find(x=>(x.name||'').indexOf('🛟')===0 || x.name==='Техподдержка');
  if(sr){ supportRoomId=sr.id; return supportRoomId; }
  try{
    const r=await fetch('/user/rooms',{...J,method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:'🛟 Техподдержка'})});
    if(r.ok){ const d=await r.json(); supportRoomId=d.id; rooms.push({id:d.id,name:'🛟 Техподдержка',is_owner:true}); }
  }catch(e){}
  return supportRoomId;
}
async function openSupport(){
  const id=await ensureSupportRoom();
  if(!id){ alert('Не удалось открыть техподдержку'); return; }
  setRoom(id,'🛟 Техподдержка');
  document.getElementById('chatAva').textContent='🛟';
  document.getElementById('chatStatus').textContent='техподдержка · отвечу здесь';
  go('vChat'); seen.clear(); log.innerHTML='<div class="empty">Напиши сообщение — можно со скринами (📎). Это отдельная ветка, отвечу здесь.</div>';
  await refresh(true);
}
window.addEventListener('appinstalled',()=>{ buildProfile(lastUser); });

/* ─── Старт ─── */
applyTheme();
loadRooms();
loadProfile();
setInterval(()=>{ if(document.getElementById('vChat').classList.contains('active')) refresh(false); }, 4000);
</script>
</body>
