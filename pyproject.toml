# Ruff config — centralised lint policy для CI и локальных запусков.
# 2026-05-26: добавлено чтобы починить CI/lint, который падал на E402 (conditional
# imports), E701/E722 (бесопасно-bare except в bg-tasks), E741 (l как loop var
# в analyzer). Эти паттерны — намеренные, не баги.
#
# Запуск идентичный CI:
#   ruff check app/ mcp_server/ tests/

[tool.ruff]
line-length = 200

[tool.ruff.lint]
# Канонический набор: ошибки, fail, white-space, isort.
select = ["E", "F", "W", "I"]

ignore = [
    "E501",   # line too long — ASCII art, multi-line SQL читаются лучше длинными
    "E402",   # module-level import not at top — много conditional/lazy imports в bootstrap
    "E701",   # multiple statements on one line (colon) — `except: pass` patterns
    "E722",   # bare except — в background-tasks нужно ловить ВСЁ чтобы не убить runtime
    "E741",   # ambiguous variable name (l) — `for l in lines:` в текст-парсере
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F841"]  # unused vars в тестах — часто intentional (test fixture binding)
