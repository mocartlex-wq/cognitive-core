name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 5 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./launch
    steps:
      - uses: actions/checkout@v4

      - name: Verify required tools
        run: docker --version && docker compose version && jq --version

      - name: Validate compose file
        run: |
          cp .env.example .env
          sed -i \
            -e "s|CHANGE_ME_postgres_password|ci_pwd_$(openssl rand -hex 8)|" \
            -e "s|CHANGE_ME_minio_access_key|ci_$(openssl rand -hex 6)|" \
            -e "s|CHANGE_ME_minio_secret_key|ci_$(openssl rand -hex 12)|" \
            .env
          docker compose -f docker-compose.public.yml config --quiet

      - name: Validate OpenAPI spec
        run: |
          pip install --quiet openapi-spec-validator
          python -m openapi_spec_validator openapi/rooms.yaml

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet ruff
      - run: ruff check launch/mcp-wrapper/ launch/extras/ || true
        continue-on-error: true

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: "launch/**/*.md"
          config: "launch/.markdownlint.json"
        continue-on-error: true
