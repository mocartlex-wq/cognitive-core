name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & start stack
        run: |
          cp .env.example .env
          # Тестовый ключ DeepSeek НЕ требуется для unit-тестов sanitizer/embedder/models
          docker compose up -d --build
          sleep 15

      - name: Wait for healthy
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:9001/health | grep -q '"healthy":true'; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          docker logs cognitive_api
          exit 1

      - name: Run unit tests (no LLM)
        run: |
          docker exec cognitive_api python -m pytest \
            tests/test_models.py \
            tests/test_sanitizer.py \
            tests/test_embedder.py \
            -v --tb=short

      - name: Run integration tests (no LLM)
        run: |
          docker exec cognitive_api python -m pytest \
            tests/test_dashboard.py \
            tests/test_pgvector.py \
            -v --tb=short

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== API logs ==="
          docker logs cognitive_api --tail 100
          echo "=== Postgres logs ==="
          docker logs cognitive_postgres --tail 50

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.6.*
      - name: Lint
        run: ruff check app/ mcp_server/ tests/ --select E,F,W,I --ignore E501

  build-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Dockerfile builds
        run: docker build -t cognitive-core:ci .
