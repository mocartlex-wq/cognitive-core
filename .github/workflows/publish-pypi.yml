name: publish-pypi

# Builds + publishes cognitive-core-mcp to PyPI via Trusted Publishing (OIDC).
# No PYPI_API_TOKEN secret needed — just a one-time pending-publisher setup at
# https://pypi.org/manage/account/publishing/ with:
#   PyPI Project Name : cognitive-core-mcp
#   Owner             : mocartlex-wq
#   Repository name   : cognitive-core
#   Workflow filename : publish-pypi.yml
#   Environment name  : pypi

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/cognitive-core-mcp
    defaults:
      run:
        working-directory: ./launch/mcp-wrapper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade pip build

      - name: Sync version from git tag
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          sed -i "s|^version = .*|version = \"$TAG\"|" pyproject.toml
          grep '^version' pyproject.toml

      - name: Build wheel + sdist
        run: |
          python -m build
          ls -lh dist/

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./launch/mcp-wrapper/dist/
          # No password / token needed — OIDC handshake with PyPI

      - name: Summary
        if: always()
        run: |
          echo "### MCP wrapper publish" >> $GITHUB_STEP_SUMMARY
          echo "Install: \`pip install --upgrade cognitive-core-mcp\`" >> $GITHUB_STEP_SUMMARY
