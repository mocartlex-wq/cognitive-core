name: publish-image

# Builds + pushes the api image to ghcr.io.
# Triggers:
#   - git tag v*  (release)
#   - manual workflow_dispatch
#
# Resulting tags: ghcr.io/<owner>/cognitive-core-api:<version>, :latest
# Pulls into docker-compose.public.yml via IMAGE_API env var.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (default: dev)"
        required: false
        default: "dev"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lower-case owner for image name
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Compute version tag
        id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag || 'dev' }}" >> $GITHUB_OUTPUT
          fi

      - name: Build + push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/cognitive-core-api:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ steps.owner.outputs.name }}/cognitive-core-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build + push extras image
        uses: docker/build-push-action@v6
        with:
          context: ./launch/extras
          file: ./launch/extras/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/cognitive-core-extras:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ steps.owner.outputs.name }}/cognitive-core-extras:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "### Published images :package:" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ steps.owner.outputs.name }}/cognitive-core-api:${{ steps.ver.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ steps.owner.outputs.name }}/cognitive-core-extras:${{ steps.ver.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use in your \`launch/.env\`:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "IMAGE_API=ghcr.io/${{ steps.owner.outputs.name }}/cognitive-core-api:latest" >> $GITHUB_STEP_SUMMARY
          echo "IMAGE_EXTRAS=ghcr.io/${{ steps.owner.outputs.name }}/cognitive-core-extras:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
