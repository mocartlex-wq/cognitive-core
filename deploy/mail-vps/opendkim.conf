# OpenDKIM конфиг — подписывает исходящие письма
# Placeholders: __DOMAIN__ — заменяется setup.sh

# Базовая конфигурация
Syslog                  yes
SyslogSuccess           yes
LogWhy                  yes

# Кому подписывать
Mode                    s          # только подписывать (signing), не верифицировать входящие
Canonicalization        relaxed/simple
SubDomains              no

# UNIX socket — для Postfix
Socket                  local:/var/spool/postfix/opendkim/opendkim.sock
PidFile                 /run/opendkim/opendkim.pid
UserID                  opendkim:opendkim
UMask                   002

# Привязка ключей: см. KeyTable и SigningTable
KeyTable                /etc/opendkim/KeyTable
SigningTable            refile:/etc/opendkim/SigningTable
ExternalIgnoreList      /etc/opendkim/TrustedHosts
InternalHosts           /etc/opendkim/TrustedHosts

# Безопасность
OversignHeaders         From
SignHeaders             From,Reply-To,Subject,Date,To,Cc,Message-ID,MIME-Version,Content-Type
MinimumKeyBits          1024
