name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please redact secrets from any logs.

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `make versions` (or the image tag you're running)."
      placeholder: "v0.5.0 / api:abc123"
    validations:
      required: true

  - type: dropdown
    id: how
    attributes:
      label: How did you install
      options:
        - "curl | bash quickstart"
        - "manual git clone + make up"
        - "Custom (please describe)"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps from a fresh `make up` to the bug.
      placeholder: |
        1. make init
        2. make up
        3. curl … (the call that fails)
        4. observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include error messages, exit codes, anything useful.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`make logs` excerpt (last 30-50 lines around the failure)."
      render: shell

  - type: input
    id: os
    attributes:
      label: OS / Docker version
      placeholder: "Ubuntu 22.04, Docker 25.0.3, compose v2.24"

  - type: checkboxes
    id: terms
    attributes:
      label: I agree to:
      options:
        - { label: "Search existing issues before opening", required: true }
        - { label: "Redact any secrets / API keys from logs", required: true }
