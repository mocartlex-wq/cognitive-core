# Cognitive Core — GPU overlay (опционально)
#
# Использование:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.gpu.yml up -d --build
#
# Что делает:
#   - Переключает api с Dockerfile на Dockerfile.gpu (CUDA 12.4 runtime base)
#   - Прокидывает все доступные GPU в контейнер api
#   - Включает EMBEDDING_USE_GPU=true в окружении
#
# Требования на хосте:
#   - NVIDIA driver >= 525
#   - nvidia-container-toolkit
#
# Проверка после старта:
#   docker exec cognitive_api nvidia-smi      # должен показать GPU
#   curl localhost:9001/health | jq           # provider должен быть "CUDA"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    environment:
      EMBEDDING_USE_GPU: "true"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      # Whisper на GPU — ускорение ~5-10x на GTX 1050 Ti для base модели.
      # ВНИМАНИЕ: faster-whisper (ctranslate2) на CUDA требует libcudnn8.
      # Если контейнер падает с "libcudnn_ops_infer.so.8: cannot open" — нужно
      # переключить base image Dockerfile.gpu на `nvidia/cuda:12.2.0-cudnn8-runtime-ubuntu22.04`
      # или install: `apt-get install -y libcudnn8`.
      WHISPER_DEVICE: "cuda"
      WHISPER_COMPUTE_TYPE: "int8_float16"  # Pascal (compute 6.1) doesn't do efficient FP16; mixed int8/FP16 is best
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
