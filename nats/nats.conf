# Cognitive Core — NATS server config.
# Plain TCP on 4222 (in-cluster) + monitoring on 8222 + WebSocket on 8443.
# JetStream enabled with on-disk store for durable streams.
#
# Mounted into cognitive_nats container at /etc/nats/nats.conf
# (see docker-compose.override.yml). MUST exist as a regular file
# before `docker compose up nats` — otherwise the bind mount creates
# a directory and the container fails with mount error.
#
# Production hardening (see docs/HARDENING.md):
#   - enable TLS on websocket
#   - restrict allowed_origins to your domains
#   - add authorization {users: [...]} block

server_name: cognitive-nats
port: 4222
http: 8222

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 2GB
}

websocket {
  port: 8443
  no_tls: true            # set to false + add tls{} block in production
  same_origin: false
  allowed_origins: []     # [] = allow all; restrict in production
}

# Logging
debug: false
trace: false
logtime: true
