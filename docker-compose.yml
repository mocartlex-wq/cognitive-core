services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cognitive_postgres
    # Production: POSTGRES_PASSWORD должен быть в .env (не использовать default!)
    # Dev fallback: cognitive_secret для локальной разработки
    environment:
      POSTGRES_DB: cognitive_core
      POSTGRES_USER: cognitive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cognitive_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognitive -d cognitive_core"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: cognitive_redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cognitive_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9002:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cognitive_api
    ports:
      - "9001:8000"
    env_file:
      - .env
    volumes:
      - ./sandbox:/app/sandbox
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
